const ANALYSIS = {
  "fernando mendoza": "The model's top QB projection is built almost entirely on PFF grade — grade_only approach — where Mendoza's 90.7 PFF pass grade and 9.3 yards/attempt rank first in the class. At 54% useful / 40% star, this is the strongest QB probability pair in the draft and rare territory for any position. His 77% clean-pocket completion rate confirms he's not just padding efficiency on checkdowns. The honest caveat: this QB class is thin, so relative grade rankings amplify his signal — if Mendoza's grades reflect a weak conference schedule, the model may be overfitting to a shallow talent pool.",
  "ty simpson": "Simpson's 81.4 PFF pass grade combined with a 6.0% big-time throw rate is the key driver of his 36%/23% probability score — respectable upside for a day-2 QB. The grade_only model is crediting his clean-pocket completion rate of 80.0% as a consistency signal that limits his bust profile. His PFF #36 rank suggests scouts have moderate conviction, which the model uses as a calibration anchor. With 23% star probability, there's genuine but limited ceiling — he profiles as a reliable starter in the right system rather than a dynasty cornerstone.",
  "garrett nussmeier": "Nussmeier's 9.5 yards/attempt is the best in this QB class, but his 72.4% clean-pocket completion rate is the red flag the model weights heavily against him. Grade_only projection produces 21%/12% — real starter potential but a boom-or-bust arm profile. His PFF #83 rank reflects scouts' concerns about accuracy under pressure, which the model validates. At 10.9 projected PPG in a 6pts/TD scoring system, his ceiling requires him to generate big plays consistently; his completion efficiency suggests he won't always find the safe outlet. Late stash with clear upside if NFL coaching addresses his accuracy.",
  "carson beck": "Beck's 90.8 PFF pass grade — highest of any QB in this class — creates the most significant tension in the QB model: elite tape grade at PFF #97 overall rank. The grade_only model produces 17%/9% probabilities, which is technically accurate but arguably undersells the grade signal given how rare a 90+ PFF grade is at any rank. His 9.4 YPA and 76.1% clean-pocket completion are both genuinely good. The most honest interpretation: scouts are almost certainly discounting injury history or scheme context, and if that discount is excessive, Beck could be the best-value QB in the class at auction prices.",
  "taylen green": "Green ranks #228 overall but carries a 79.2 PFF grade and 5.5% BTT rate — the model is finding value not captured in his consensus position. At 17%/10%, his probability profile is nearly identical to Beck's despite a 130-spot rank difference, which says the grade_only approach is crediting his tape over his draft position. His 8.2 YPA is below the class leaders. The uncertainty is whether his grade reflects genuine ability or favorable matchup context; PFF #228 means almost no one drafts him, so the cost is near-zero for a stash. If even one NFL team gives him a legitimate look, his model signal could pay off.",
  "sawyer robertson": "Robertson's 74.8 PFF grade is below average but his 6.8% big-time throw rate is third-highest in the QB class — a signal the grade_only model picks up as explosive downfield ability. At 10%/5%, the probabilities are near the floor of starter consideration. His 75% clean-pocket completion is solid enough to suggest he's not simply inaccurate; the low grade likely reflects scheme limitations or turnover tendencies. In 8-team dynasty auction formats with no free agency, he's a token bid stash with marginal expected value.",
  "haynes king": "King's 14.8 yards/attempt is a statistical outlier for this class — almost certainly inflated by a system emphasizing deep shots over volume throws. His 81.0 PFF grade is respectable, but PFF #245 rank tells you scouts are heavily discounting the context. The grade_only model produces 10%/5% — minimal but real probability — acknowledging the grade quality while penalizing the rank. In a dynasty format scoring 6pts/TD pass, his boom-or-bust arm could produce meaningful weeks, but consistency is a legitimate concern. Low-cost deep stash only.",
  "joey aguilar": "Aguilar presents the single largest grade-to-rank divergence of any QB in this class: a 90.6 PFF grade — matching Mendoza — from PFF #246. The grade_only model can't fully resolve this tension, producing 10%/5% probabilities. His 6.2% BTT rate and 8.8 YPA confirm the throwing ability the grade captures. The most likely explanation for the rank suppression is athleticism or injury concerns scouts are pricing in that pure tape grades miss. For dynasty purposes, this is a high-intrigue stash — if you believe scouting grades over positional rankings, Aguilar may be the most underpriced QB in the class.",
  "cade klubnik": "Klubnik's 87.7 PFF grade is strong but his 7.5 YPA is the lowest of the named QB prospects, suggesting a system that limited deep attempts and inflated completion efficiency. At 8%/4% from PFF #138, the grade_only model is appropriately skeptical — good tape quality but limited evidence he can push the ball vertically in the NFL. His dynasty ceiling is constrained by the YPA figure more than anything else; in a 6pts/TD format, you need QBs who can generate explosive passing plays. Viable late stash, not a meaningful auction target.",
  "drew allar": "Allar's 79.3 PFF grade and 8.4 YPA are middling for this class, and his PFF #140 rank reflects that assessment consistently across scouts. The grade_only model produces 8%/4% — near-floor consideration — accurately representing a game-manager profile with limited dynasty upside. His clean-pocket performance was serviceable but nothing the model flags as a hidden value signal. At PFF #140 he'll be a free-agent camp arm at best; not worth auction capital in 8-team dynasty formats.",
  "tommy castellanos": "Castellanos has the highest big-time throw rate in the QB class at 7.0% and an 85.4 PFF grade, yet ranks #252 overall. The grade_only model gives him 7%/4% — correctly noting that deep-rank grades carry significant uncertainty calibration. His 8.9 YPA confirms he can push the ball downfield. If scouts are wrong about his NFL transition and he earns regular-season snaps, his BTT rate suggests he'll generate big-play scoring events. A curiosity play at minimal cost in dynasty auctions.",
  "miller moss": "Moss's 88.9 PFF grade and 11.4 YPA are both excellent and would produce significantly stronger probabilities at a better rank, but PFF #258 buries the model's calibration. At 7%/4%, the probability is near floor. His YPA figure is the second-highest in the class and his PFF grade is in the upper third, suggesting his tape is genuinely good. The gap between his metrics and his rank is wide enough to be suspicious in either direction — either scouts are significantly wrong or there's a data quality issue. Low-cost late gamble with real tape backing it.",
  "diego pavia": "Pavia has the highest BTT rate in the class at 7.4% and a 90.7 PFF grade matching Mendoza — both elite signals — from PFF #259. The size/athleticism discount from scouts that produces that rank is exactly the limitation the grade_only model can't correct for. At 7%/3%, the model is appropriately skeptical about NFL opportunity translating, but his throwing metrics are among the best in the class. Not a priority spend, but a strong intellectual bet if you believe talent wins over measurables.",
  "jalon daniels": "Daniels's 84.3 PFF grade and 7.1% BTT rate show arm talent, but a history of injuries explains his PFF #194 rank and the model's 6%/3% probability output. The grade_only model can't discount for injury risk directly, so the rank suppression does the work. His 9.3 YPA confirms he's not a checkdown artist. In a no-free-agency format, injured players who were once talented are worth a token bid to hold — but not a priority allocation.",
  "jake retzlaff": "Retzlaff's 76.9 PFF grade is below average and his 3.1% BTT rate is the lowest in the QB group — a strong indicator that he lacks the arm to push the ball downfield at the NFL level. The grade_only model gives him 6%/3%, which is accurate floor coverage. In a 6pts/TD pass format, the primary fantasy driver is explosive passing plays; Retzlaff's BTT rate suggests he won't generate them consistently. Not a meaningful dynasty asset.",
  "jeremiyah love": "Love's 146.7 elusive rating — yards created beyond contact — leads the RB class and is the primary signal in the stats_only model that produces his 85%/75% probabilities. His 6.9 yards/carry and 1,372 rush yards confirm the efficiency is built on genuine explosiveness, not just sample-size luck. In a 0.5 PPR format, his receiving ability adds a floor that pure runners lack. The risk the model doesn't capture: RB longevity and backfield depth at the NFL level are real variables. PFF #4 consensus rank validates the model's confidence — this is the highest-floor RB pick in the class.",
  "jadarian price": "Price's 110.76 elusive rating and 6.1 YPC on 744 rush yards represent above-average efficiency without dominant volume — a signal the stats_only model interprets as a back who performs well when given carries but hasn't yet seen a full workload. At 45%/25%, his probability is in the solid day-2 range. His modest carry total means the model is calibrating on efficiency rather than certainty. If he earns a featured role at the NFL level, his YPC efficiency suggests he'll convert it; the question is opportunity, which the model can't predict.",
  "jonah coleman": "Coleman's 153.4 elusive rating is second-highest in the class — above Love's — making him the class's best big-play back by this metric. But his 5.5 YPC on only 1,060 carries tells the real story: he makes spectacular plays without the volume that builds consistent weekly PPG. The 45%/25% probabilities tie him with Price despite superior elusiveness because the stats_only model weights volume as a necessary component of fantasy production. In a 0.5 PPR format, he needs a lead role to hit ceiling; as a committee back, he's boom-or-bust at best.",
  "emmett johnson": "Johnson's 88.3 elusive rating is below average for this class, but his 1,450 rush yards on 5.8 YPC shows a back who earns carries through consistency and efficiency rather than open-field explosiveness. The stats_only model values both dimensions, producing 34%/19% — solid starter probability with limited star ceiling. His volume profile suggests he can handle a workhorse role, which is the primary driver of RB fantasy value in 0.5 PPR scoring. A reliable mid-round target with predictable production if he becomes a feature back.",
  "seth mcgowan": "McGowan's 107.61 elusive rating is above average but his 824 rush yards on 5.01 YPC represents modest volume output. The stats_only model produces 22%/10% — the broad middle tier of the RB class where most day-3 backs cluster. His above-average elusiveness is the one metric that might support outperforming his rank, but limited carries make the calibration less reliable. In no-free-agency dynasty formats, he's worth a late stash if he earns a starting role, but not a priority spend.",
  "nicholas singleton": "Singleton's 88.58 elusive rating is average, but his 6.4 YPC on 1,106 yards is above-average efficiency for his volume tier. The stats_only model gives him 22%/10%, but his 7.1 PPG projection is above the band average — the model is seeing per-carry efficiency that slightly outpaces peers with similar probability scores. His YPC metric is the primary reason to believe his projection could hit; if he's in a scheme that emphasizes zone runs and second-level openings, that 6.4 YPC is very translatable.",
  "jaydn ott": "Ott's 80.9 elusive rating is on the lower end of the 22% probability group, but 1,311 rush yards on 5.3 YPC show consistent volume production that the stats_only model values for floor reliability. At 6.2 projected PPG, he's a workmanlike back who earns value through accumulation rather than explosiveness. His elusiveness limitations cap his ceiling, but his volume profile means he can deliver steady weekly contributions in a lead role. Day-3 pick with a viable PPR floor if he holds a starting spot.",
  "kaytron allen": "Allen's 98.38 elusive rating and 5.95 YPC on 1,303 yards — both above average — form a balanced profile the stats_only model values for dual-dimension reliability. At 22%/10%, he's in the broad RB middle tier, but his per-carry efficiency is genuinely strong. The 0.5 PPR format rewards backs who stay on the field; Allen's efficiency numbers suggest he won't just be a short-yardage grinder. A quality late pick who could outperform his projection if he lands in a featured role.",
  "mike washington jr.": "Washington's 73.2 elusive rating is below average — the lowest in the 22% probability group — but his 6.4 YPC on 1,066 yards is strong. The model is reading him as a straight-line runner who creates value through scheme and blocking rather than open-field agility. That profile works in the right NFL system but regresses more than elusive backs when defenses adjust. At 22%/10%, he's correctly placed in the middle tier. His PPG upside depends heavily on offensive line quality and scheme fit at the next level.",
  "j'mari taylor": "Taylor's 8.0 PPG projection is the highest of any RB in the 22%/10% probability band, driven by a 90.9 elusive rating despite only 4.8 YPC — a signal that he creates significant value beyond the line that isn't reflected in per-carry averages. The model may be reading additional context in his profile not captured by the three primary stats. His low YPC is a concern; it could indicate opportunity dependency or an inconsistent offensive line. High upside projection relative to his probability band makes him a buy-low target, but validate the YPC concern before investing.",
  "desmond reid": "Reid's 9.0 PPG projection — highest of any RB in the 22% group — with a 78.0 elusive rating and 5.2 YPC on 968 yards is a projection the model is amplifying beyond what the three displayed stats alone would explain. Something in his broader profile is pushing his ceiling estimate significantly above peers with better primary metrics. PFF #197 means almost no one bids on him; if the model's signal is real, he represents extreme positive expected value at auction. Treat as a high-upside lottery ticket — not a core asset but worth a token bid.",
  "demond claiborne": "Claiborne's 69.6 elusive rating is the lowest in the top-15 RB group and his 4.6 YPC is below average — both the primary signals the stats_only model uses, and neither inspires confidence. His 1,053 rush yards show volume but not efficiency. At 21%/10%, the model is correctly placing him just below the 22% band. He's a volume-dependent back who needs a large workload to generate fantasy value in 0.5 PPR scoring. Not a priority in 8-team auction formats.",
  "le'veon moss": "Moss's 2.8 PPG projection is a significant anomaly for a player with a 94.2 elusive rating and 6.3 YPC — both legitimately above-average metrics. The stats_only model is applying a heavy discount based on extremely limited volume at 765 rush yards, which makes the calibration unreliable. At 16%/8%, his probability is actually reasonable given the data constraints. His underlying efficiency is genuinely interesting; the model simply can't project value without carries to anchor the estimate. Watch for NFL opportunity before investing meaningfully.",
  "roman hemby": "Hemby's 62.6 elusive rating is the lowest in the top-15 RB group by a wide margin, yet his 1,118 rush yards on 4.9 YPC reflect consistent volume production despite limited open-field ability. The stats_only model gives him 10%/4% — correctly at the floor tier. Pure volume backs sometimes outperform efficiency-based models in the right scheme, but in 0.5 PPR dynasty formats, you want at least average elusiveness for the explosiveness that creates upside. Late auction stash only if he earns a starting role.",
  "rahsul faison": "Faison's 127.0 elusive rating is the second-highest in the entire RB class — a dominant open-field creation metric — but his 5.6 YPC on 1,107 yards suggests the elusiveness hasn't fully converted to per-carry production yet. The model gives him 10%/4% due to his PFF #231 rank suppressing calibration. This is the most interesting value tension in the RB class: elite elusiveness at nearly zero auction cost. If his NFL opportunity is real, he's the kind of player whose ceiling is dramatically underpriced by the model's conservative rank discount.",
  "carnell tate": "Tate's 89.0 route grade and 2.28 YPRR with 35 first downs form the foundation of his class-leading 86%/41% WR probability. The grade_combined model is weighting both his PFF production metrics and scout grade equally, and both point to an elite receiver. His first-down rate suggests he's a chain-mover who plays in critical moments, not just a gadget receiver. In a 1pt PPR format, his combination of route separation and consistent target production justifies premium auction pricing — he's the WR anchor of this class.",
  "makai lemon": "Lemon's 3.13 YPRR is the highest in the WR class — elite per-route efficiency — and his 91.4 route grade confirms the separation ability his production metric predicts. His 50 first downs are the second-highest in the class. The grade_combined model values both halves equally, and both are in the top tier, producing 76%/30%. In a 1pt PPR format, YPRR efficiency is the primary driver of receiving upside; Lemon's mark is genuinely special. He's the highest-ceiling pure receiving asset in this WR class.",
  "elijah sarratt": "Sarratt's 90.2 route grade is third-best in the class and his 2.92 YPRR is elite, yet he ranks #67 overall — a significant consensus undervaluation that the grade_combined model is actively flagging at 51%/15%. His 60 first downs — highest of any WR in this top-15 — shows he's a dominant chain-mover, not just a one-play threat. The model sees a receiver whose technical ability and production are both well above what his draft position suggests. If he's available in the second half of your auction below the top-WR price tier, he may be the single best value in the class.",
  "omar cooper jr.": "Cooper's 86.0 route grade and 2.55 YPRR with 44 first downs form a balanced, above-average profile at every metric. The grade_combined model produces 50%/15% — solid starter probability from a PFF #45 day-2 prospect who should see early NFL targets. No single metric is elite, but the absence of any weakness gives the model confidence in his floor. In dynasty formats, floor reliability is valuable; Cooper is the kind of receiver who sticks on rosters and earns consistent targets even without a breakout role.",
  "malachi fields": "Fields's 83.9 route grade is above average but his 1.85 YPRR is below the class median — a meaningful divergence where technique exceeds per-route production. The grade_combined model produces 48%/14%, appropriately tempering the grade enthusiasm with the efficiency reality. His 39 first downs reflect consistent but limited production. He profiles as a possession receiver who creates separation through craft rather than athleticism. In a 1pt PPR format, his reliable target floor is the primary dynasty value driver.",
  "ted hurst": "Hurst's 82.1 route grade and 2.17 YPRR with 49 first downs from PFF #169 creates the most striking value tension in the WR class: the model projects 48%/14% — nearly equal to players ranked 100 spots higher. The grade_combined model is seeing above-average tape quality and production not reflected in his consensus rank. His first-down total (49) is among the top tier of the class. If scouts are primarily discounting his opposition level, this could be the biggest WR value play in the auction. Monitor his NFL depth chart situation closely.",
  "chris brazzell ii": "Brazzell's 80.6 route grade and 2.57 YPRR with 42 first downs are consistently above average across all three grade_combined inputs. At 45%/13% from PFF #93, he's a day-3 receiver with legitimate starter probability. His YPRR efficiency is the strongest signal — 2.57 is genuinely good, suggesting he creates separation even against better athletes. In a 1pt PPR format, per-route efficiency translates directly to receiving value. A buy-low target in the second half of the auction.",
  "kc concepcion": "Concepcion's 79.9 route grade and 2.46 YPRR with 48 first downs form a reliable production profile from PFF #31 — a day-2 pick who should see early NFL opportunities. At 43%/12%, the grade_combined model is appropriately modest: his route grade is below the elite tier, but his consistent first-down production shows he converts targets efficiently. He's a realistic WR2/3 in the NFL, which in dynasty terms means a viable flex with volume upside if the depth chart is favorable.",
  "antonio williams": "Williams's 79.6 route grade and 2.05 YPRR are below the class median for efficiency, but his 42 first downs show consistent production in high-leverage moments. At 40%/11%, the model is projecting a WR3 starter upside profile — reliable without being exciting. His per-route efficiency is the limiting factor; in a 1pt PPR format, YPRR below 2.0 is a moderate ceiling cap. Solid depth value at low auction prices, not a priority spend.",
  "jordyn tyson": "Tyson's 3.04 YPRR is third-highest in the WR class and his 85.3 route grade is elite, yet PFF #20 rank produces only 39%/11% — the most significant model undervaluation in the WR class. His 51 first downs confirm the production quality. The disconnect almost certainly reflects injury history suppressing consensus rank while his grade and production metrics remain pristine. This is a high-variance bet: elite metrics + injury risk. If healthy, his ceiling is WR1 upside that his probability score severely underrepresents.",
  "denzel boston": "Boston's 87.2 route grade is the second-best in the WR class, but his 1.96 YPRR tells a story of a technically gifted receiver who hasn't yet maximized per-route production. The grade_combined model produces 34%/9% — appropriately cautious about efficiency — while crediting his elite technique. His 49 first downs show he converts targets consistently when he gets them. In dynasty terms, his ceiling depends on whether NFL volume unlocks the production his route grade predicts. PFF #23 rank should ensure opportunities to prove it.",
  "germie bernard": "Bernard's 79.2 route grade and 1.70 YPRR are both below the class median, which the 31%/9% probabilities accurately reflect. His 42 first downs provide a consistent production floor. The grade_combined model isn't finding a standout signal in either the grade or the stats component — he's a balanced, below-average profile across both inputs. In a 1pt PPR format, his limited YPRR is the primary ceiling constraint. Best suited as a cheap depth add in longer roster dynasty formats.",
  "de'zhaun stribling": "Stribling's 78.8 route grade and 1.82 YPRR are middling, but his 41 first downs from PFF #116 suggest he's producing above what his rank alone would predict. The 30%/8% probabilities reflect marginal value tension between his production and consensus position. His above-average first-down production is the one signal the model is crediting. If he lands as a designated possession receiver in a scheme that uses him in the intermediate zone, his consistency could make him a dynasty flex value.",
  "chris bell": "Bell's 83.3 route grade and 2.23 YPRR with 45 first downs are quality metrics from a PFF #42 prospect, yet his 27%/8% probabilities are lower than what that rank typically produces in the grade_combined model. There may be year-over-year inconsistency in his production profile that the model is discounting. His consensus rank (#42) should earn him early NFL targets, which means his floor is higher than his probability score reflects. A slightly discounted floor play — buy based on rank, not on model enthusiasm.",
  "ja'kobi lane": "Lane's 81.8 route grade and 2.34 YPRR with 37 first downs form a coherent late-round WR profile with nothing that stands out as a premium signal. At 26%/7%, the model is projecting marginal starter probability — the kind of receiver who makes rosters and contributes in limited roles. His YPRR and route grade are both solid for his rank position but don't differentiate him from the receiver tier above him. Dynasty value requires a favorable depth chart situation and volume he's unlikely to see without an injury ahead of him.",
  "kenyon sadiq": "Sadiq's 80.4 offense grade is the primary grade_only driver behind his 56%/23% probability — the strongest TE projection in this class. His 1.62 YPRR and 11.0 yards per reception reflect a receiver who contributes through consistent intermediate routes rather than flashy big plays. PFF #28 consensus rank confirms scouts agree with the model. In a 1.5x PPR format for TEs, his combination of starter probability and consistent route usage creates a genuine floor. He's the clear TE1 target in this class and should command corresponding auction prices.",
  "eli stowers": "Stowers's 86.9 offense grade is the highest in the TE class — the most powerful signal in a grade_only model — and his 2.55 YPRR and 12.4 yards per reception show elite receiving efficiency. At 38%/11%, he's the clear second option in the TE class. The grade may be partially driven by blocking quality rather than pure receiving contribution, which would create some uncertainty about his fantasy-relevant role at the NFL level. His receiving metrics are good enough that if he's used as a pass-catcher first, he could outperform his probability score significantly.",
  "max klare": "Klare's 78.8 offense grade and 2.22 YPRR with 13.4 yards per reception — the second-highest YPR of the top-5 TEs — show above-average after-catch production. The grade_only model projects 29%/6% from PFF #62, placing him in the third tier of TE value. His YPR suggests big-play ability in the seams and crossing routes. In a 1.5x PPR format, a TE who generates yards after the catch has compounding value on big-play receptions. A viable late-auction TE2 with upside if used as a move tight end.",
  "marlin klein": "Klein's 64.6 offense grade is the lowest of the top-4 TEs, but his 1.53 YPRR and 10.3 yards per reception provide consistent floor production. The 28%/6% probabilities are nearly equal to Klare despite the grade gap, suggesting volume consistency is partially offsetting the grade deficit in the model's calibration. PFF #117 rank places him in the day-3 range where full-time starter roles are far from guaranteed. A viable stash in longer dynasty formats at minimal auction cost.",
  "sam roush": "Roush's 61.3 offense grade is below the TE class median and his 1.39 YPRR is the lowest of any named TE in this group. The grade_only model's 20%/4% probability accurately reflects limited fantasy upside on both inputs. His 11.1 yards per reception suggests some receiving ability, but the overall profile is that of a blocking TE who earns carries in red zone situations rather than a dynasty pass-catcher. Fantasy relevant only with a specific pass-catching role — which his grade doesn't predict.",
  "jack endries": "Endries's 77.0 offense grade and 1.73 YPRR with 11.1 yards per reception are average across all three grade_only inputs. At 19%/3% from PFF #74, the model sees a functional but unexceptional NFL TE who contributes in a complementary role. Nothing in his metrics stands out as a premium signal. His PFF #74 rank should get him drafted and onto an NFL roster, but dynasty-relevant target volume is far from guaranteed. Minimal auction value.",
  "rj maryland": "Maryland's 15.2 yards per reception is the highest of any TE in this class — a genuine big-play receiving signal — paired with a 71.7 offense grade from PFF #286. The grade_only model gives him 15%/2%, picking up the YPR signal while appropriately discounting for the deep rank. His receiving efficiency (1.69 YPRR, 15.2 YPR) suggests legitimate downfield ability when targeted. High-variance late lottery ticket: his talent is real, his NFL opportunity is the massive question mark. Token bid only.",
  "michael trigg": "Trigg's 72.4 offense grade and 2.18 YPRR with 13.9 yards per reception show above-average receiving efficiency for a TE at PFF #78. At 12%/2%, the model assigns marginal starter probability — not because his receiving metrics are poor, but because overall grade quality and NFL opportunity at this rank create calibration uncertainty. His YPR (13.9) and YPRR (2.18) are both above the class median, suggesting genuine pass-catching ability. Worth a modest bid if a pass-catching role is available.",
  "justin joly": "Joly's 77.9 offense grade and 1.79 YPRR with 11.83 yards per reception form a balanced but unspectacular TE profile at PFF #92. The 12%/2% probability mirrors Trigg with slightly weaker receiving metrics, placing him near the boundary of dynasty relevance. His grade quality suggests he'll make an NFL roster, but the path to significant target volume is narrow for a day-3 TE in modern offenses. Fantasy relevant only in 12+ team dynasty leagues with deep rosters.",
  "jaren kanak": "Kanak's 64.1 offense grade is low but his 1.73 YPRR and 12.0 yards per reception from PFF #272 represent productive efficiency for a deep prospect. The grade_only model gives him 12%/2% — finding some value in his receiving metrics despite the grade deficit. His athletic profile likely exceeds what his college offense allowed him to showcase. A lottery-ticket TE whose cost is near zero at auction; the potential return if he earns a receiving role is meaningful relative to the investment.",
  "nate boerkircher": "Boerkircher's 74.5 offense grade and 1.12 YPRR — lowest in the TE group — describe a blocking-first TE whose fantasy relevance is minimal in a 1.5x PPR format. The 11%/1% probabilities are accurate: without target volume, TEs in this scoring structure generate very little PPG. His overall grade suggests NFL viability as a two-way TE, but that doesn't translate to dynasty fantasy value. Skip in auction formats.",
  "joe royer": "Royer's 66.1 offense grade and 1.48 YPRR with 10.4 yards per reception put him near the bottom of the TE group on all three grade_only inputs. The 10%/1% probabilities represent the floor of dynasty consideration. In a 1.5x PPR format, blocking TEs without consistent target volume generate insufficient PPG to be roster-worthy in 8-team formats. His profile suggests a camp TE at best at the NFL level.",
  "john michael gyllenborg": "Gyllenborg's 79.6 offense grade and 2.44 YPRR with 14.1 yards per reception are both above the TE class median — solid receiving metrics from PFF #186. Yet the grade_only model gives him only 9%/1%, a significant undervaluation of his receiving profile relative to his metrics. His YPRR (2.44) and YPR (14.1) are both in the top half of the class. This may be one of the stronger late-round value plays at TE — genuine receiving ability at near-zero auction cost.",
  "eli raridon": "Raridon's 72.9 offense grade and 15.1 yards per reception — the highest YPR of all named TEs — with 2.23 YPRR reflect a big-play receiving profile the grade_only model acknowledges at 8%/1%. His grade is below average, which limits the ceiling, but his per-reception efficiency is genuinely elite. In a 1.5x PPR format, TEs who generate big plays per reception have compounding value. Low-cost stash with legitimate big-play upside if he earns a receiving role.",
  "dallen bentley": "Bentley's 76.9 offense grade and 2.07 YPRR with 12.9 yards per reception form a better-than-average receiving TE profile from PFF #182. The 8%/1% probabilities reflect the deep rank discount more than the metric quality. His YPRR and YPR are both above the TE class average. Like several deep TEs in this class, the grade_only model is finding value that the consensus rank is suppressing. Worth a token late bid in dynasty formats with deep rosters.",
  "david bailey": "Bailey's 21.6% pass rush win rate and 13.3 pass rush productivity with 15 sacks lead the DE class on all three combined-model inputs. At 83%/28%, he has the strongest DE probability profile in the class, driven equally by scouting grades and production metrics. In IDP scoring where DEs earn 2.5–3.5pts/tackle plus 3pts per sack unit, consistent pressure generation is the primary PPG driver — and Bailey's win rate predicts he'll generate it at an elite rate. PFF #6 consensus rank confirms what the model is seeing. He's the DE anchor of this draft.",
  "cashius howell": "Howell's 19.9% pass rush win rate and 9.8 productivity with 12 sacks at PFF #19 produces 80%/24% — nearly identical to Bailey's projection. The model sees the two players as a near-equivalent tier separated by only marginal production differences. In auction formats, the price gap between Bailey and Howell may be wide enough that Howell represents better expected value per dollar. His win rate and sack production both confirm elite pass rushing ability with the consensus rank to match.",
  "malachi lawrence": "Lawrence's 15.75% pass rush win rate and 8.78 productivity with 8 sacks from PFF #61 represents the clear second tier of the DE class at 52%/10%. The combined model is crediting both his tape quality and his stat production, finding consistent signals across both inputs. His win rate is above average for the class, and in IDP scoring formats, above-average pressure generation translates directly to fantasy value. A day-2 pick with legitimate starter upside who should produce meaningful IDP points in a rotational role.",
  "rueben bain jr.": "Bain has the highest pass rush win rate in the class at 23.5% — a premier pressure metric — paired with PFF #2 overall rank. Yet the combined model projects only 30%/5%, a significant disconnect. The model's historical calibration is suggesting that DE production at this level doesn't consistently convert to fantasy points, and PFF #2 may reflect upside potential over demonstrated volume production. His win rate is genuinely elite; if that translates to NFL snaps and sack production, he could dramatically outperform the 30% probability. The tension here is worth monitoring closely.",
  "akheem mesidor": "Mesidor's 20.8% pass rush win rate and 13 sacks from PFF #16 should generate stronger model confidence than 19%/3%, but the combined approach is applying a heavy production-consistency discount. His sack volume is among the best in the class but his productivity metric (9.5) is middling, suggesting sacks arrived through effort and opportunity more than elite technique. In IDP formats, consistent pressure generation matters more than peak sack counts. His win rate is the encouraging signal here; his production metrics introduce legitimate uncertainty.",
  "dani dennis-sutton": "Dennis-Sutton's 15.46% win rate and 9.49 productivity with 9 sacks at PFF #71 is a coherent day-2 pass rusher profile the combined model rates at 19%/3%. His metrics are above the class average for a day-3 pick, but the model applies significant rank pressure below the top tier. His win rate and productivity suggest a legitimate rotational DE who earns snaps through technique, not just athleticism. In IDP formats, his expected snap count is the key variable — a high-snap role with these production metrics is a viable fantasy floor.",
  "anthony lucas": "Lucas's 12.4% pass rush win rate is below average for this class and his 5.0 productivity with only 3 sacks are limited output metrics that the combined model correctly prices at 13%/2%. His below-average win rate suggests he's not generating elite pressure, and his sack total confirms limited conversion. In IDP scoring, situational pass rushers without consistent pressure production generate insufficient weekly value to roster in 8-team formats. Late-stash only if his NFL role expands.",
  "keyron crawford": "Crawford's 13.07% win rate and 7.86 productivity with 7 sacks at PFF #90 is a workmanlike profile the combined model rates at 6%/1%. His metrics are in the average range for a day-3 DE, but the rank and production combination doesn't generate the type of consistent pressure that translates to fantasy IDP value. He'll make an NFL roster but is unlikely to see the snap count needed for meaningful PPG production. Minimal dynasty value.",
  "keldric faulk": "Faulk's 11.6% win rate and 9.25 productivity with 9 sacks from PFF #17 produces only 4%/1% — the most counterintuitive result in the DE class. The combined model is seeing significant inconsistency across his production profile that raw season numbers don't capture, or his production is heavily scheme-dependent. His PFF #17 rank will earn him starter snaps, but the model's historical calibration for DE prospects at his metric level doesn't predict reliable fantasy production. Proceed with caution despite the elite consensus rank.",
  "t.j. parker": "Parker's 15.3% win rate and 9.1 productivity with 12 sacks at PFF #26 should produce significantly stronger model confidence than 4%/1%. Like Faulk, the combined model appears to be finding year-over-year inconsistency or scheme dependency in his production pattern. His sack total (12) is strong but the underlying pressure metrics suggest they came in clusters rather than through consistent game-to-game dominance. In IDP fantasy, week-to-week consistency matters as much as peak production. Monitor his actual snap count and pressure rate carefully at the NFL level.",
  "mikail kamara": "Kamara's 16.2% win rate and 10.05 productivity with 10 sacks from PFF #102 are among the strongest secondary-tier DE metrics in the class, yet 4%/1% probability says the model sees a red flag not captured in the summary stats. This is one of the more interesting model tensions in the DE class — the metrics look like a starter but the probability says otherwise. His strong production from a mid-major position likely triggered a competition-quality discount in the calibration. High-risk research target; worth monitoring his NFL competition environment.",
  "tyreak sapp": "Sapp's 12.9% win rate and 8.1 productivity with 8 sacks at PFF #103 is a consistent if unexceptional profile. The 4%/1% probabilities are at the model floor for DE consideration. His metrics are middle-of-the-pack without any standout signal that would distinguish him from the cluster of day-3 DEs at similar probability levels. Depth piece only; not a priority dynasty acquisition in 8-team formats.",
  "isaiah ward": "Ward's 8.95% win rate and 7.3 productivity with only 4 sacks is below average on every combined-model metric, which the 3%/1% probabilities accurately reflect. His low sack total despite average win rate suggests he's generating pressure without converting it to production — a concerning pattern for fantasy IDP value. In a scoring system that rewards sacks at 3pts per half-sack unit, conversion efficiency matters. Dynasty irrelevant at current roster depth levels.",
  "zion young": "Young's 17.4% win rate and 10.7 productivity with 8 sacks from PFF #34 produces only 2%/0% — the combined model's most extreme grade-to-probability disconnect in the DE class. The historical calibration for DEs at his metric profile isn't finding the signal that leads to consistent fantasy production. His scouting rank (#34) ensures NFL opportunity; whether the model's skepticism or the scouts' enthusiasm is correct will determine his dynasty value. High-conviction buy only if you have strong reason to believe his production will translate.",
  "caden curry": "Curry's 12 sacks lead the entire DE class in absolute sack production, yet his 13.8% win rate and 10.0 productivity from PFF #170 produce only 2%/0% — the model is applying a maximum rank discount to a player with genuinely impressive production. His sack total is real; the question is whether a PFF #170 pick sees enough NFL snaps to replicate it. In IDP scoring, sacks are the high-value scoring event (3pts per half-sack) that can transform weekly totals. Deep dynasty dart at minimal cost, with legitimate sack-upside if he earns rotation minutes.",
  "caleb banks": "Banks's 11.2% pass rush win rate and 4.3% run stop rate with 7.4 productivity form the most balanced DT profile in this class. At 69%/19%, he's the clear DT1 in this draft by a meaningful margin. In IDP scoring where DTs earn 3.5pts/tackle — the highest rate of any position — his dual-threat ability to generate both pressure plays and run stops maximizes weekly PPG ceiling. PFF #13 rank confirms the model's assessment. He's the DT anchor of this class.",
  "demonte capehart": "Capehart's 8.6% run stop rate is the key signal in his 64%/16% probability projection — a dominant run-stuffing metric from PFF #110 that creates the most extreme value divergence in the entire DT class. In this IDP scoring format, 3.5pts/tackle makes pure run stoppers more valuable than in most systems; Capehart's run stop rate predicts he'll generate those tackles at an above-average rate. His pass rush contribution is minimal, which limits his ceiling in pass-rush-heavy scoring systems, but his tackles will accumulate. The highest potential surplus value in the DT class at auction.",
  "albert regis": "Regis's 8.2% run stop rate and very modest pass rush (4.2% win rate) from PFF #137 mirror Capehart's profile at a lower rank. The combined model projects 39%/7% — significant value relative to consensus. His run stop rate is the primary signal; it's above the class median and in a 3.5pts/tackle scoring system, that translates directly to weekly PPG. Like Capehart, his value is heavily tied to tackle accumulation in a starting role. A strong late-round DT target at low auction cost.",
  "gracen halton": "Halton's 10.4% pass rush win rate and 9.49% run stop rate at PFF #70 make him the most balanced two-way interior defender in the top DT group. The combined model projects 35%/6% — solid day-2 starter upside with legitimate two-way contributions. His balanced profile reduces scheme-fit risk compared to pure run stuffers or pure pass rushers. In IDP scoring, the combination of 3.5pts/tackle and sack bonuses means a two-way DT generates more weekly floor variance than a specialist. A reliable mid-auction DT option.",
  "kayden mcdonald": "McDonald's 13.8% run stop rate is the highest in the entire DT class — a dominant run-stuffing signal at PFF #24. His pass rush (4.0% win rate) is minimal, but in a 3.5pts/tackle scoring system, elite run stopping generates significant weekly PPG without requiring sacks. At 31%/5% from a top-25 pick, the model is applying a heavy pass-rush discount. If the scoring system rewards tackles at face value, McDonald could significantly outperform his probability score. Buy on tackle upside, especially if his NFL team is a run-stop-heavy defense.",
  "peter woods": "Woods's 10.43% run stop rate and 8.52% pass rush win rate at PFF #29 form a solid all-around DT profile with genuine contributions in both phases. The combined model projects 30%/5% — a quality day-2 starter who will generate volume tackle opportunities as a high-snap-count player. His PFF #29 rank ensures early NFL playing time, which is the primary variable for DT fantasy production. The consistent two-way profile makes him lower-variance than the specialists above him on the probability list.",
  "zane durant": "Durant's 8.0% run stop rate and 8.4% win rate from PFF #235 represent genuine two-way production at a very low consensus rank. The combined model projects 25%/4% — significant value tension between his metrics and position. His production at PFF #235 is more impressive than the majority of higher-ranked DTs in absolute terms. If his program-level discount is excessive and he earns consistent NFL snaps, his IDP tackle production could make him the best dollar-per-point value in the DT auction pool.",
  "christen miller": "Miller's 11.3% pass rush win rate and 8.47% run stop rate at PFF #37 form a balanced interior defender profile that the combined model rates at 21%/3% — lower than expected for a top-40 pick. The model appears to be discounting for seasonal inconsistency or production-context concerns not captured in the summary metrics. His balanced profile and consensus rank suggest starter opportunities; the model is just skeptical about conversion to consistent weekly fantasy production. Floor play with limited ceiling.",
  "domonique orange": "Orange's 6.9% run stop rate and 2.94 productivity are below the DT class average, and the 17%/3% probabilities accurately reflect limited fantasy upside from PFF #66. His metrics place him in the bottom half of named DT prospects on every combined-model input. PFF #66 rank should get him rotational snaps, but his production profile doesn't suggest above-average IDP value. Middle-of-the-road day-2 DT; not an auction priority.",
  "jackie marshall": "Marshall's 10.3% pass rush win rate and 10.3% run stop rate from PFF #287 are impressive balanced metrics from a very deep prospect — one of the strongest two-way profiles in the class regardless of rank. At 17%/3%, the model is rewarding his metrics while appropriately discounting for NFL opportunity uncertainty at PFF #287. If he earns consistent starter snaps, his production profile suggests he's genuinely capable of generating meaningful IDP value. Extreme value dart at minimal auction cost.",
  "cole brevard": "Brevard's 7.68% win rate and 5.1% run stop rate with 4.62 productivity are below the DT class median on all measures from PFF #185. At 12%/2%, the model is accurately assigning modest probabilities to a developmental DT without a standout metric. His opportunity at the NFL level is uncertain, and even with snaps, his below-average production metrics don't project to above-average fantasy value. Late stash only in deep formats.",
  "zxavian harris": "Harris's 7.0% win rate and 8.1% run stop rate are a mixed profile — below-average pass rush with above-average run stopping. The 10%/2% probabilities reflect the combined model's assessment of a run-stopping specialist with limited pass rush contribution. In a 3.5pts/tackle scoring system, his run stop ability has real value, but the win rate deficit limits his ceiling. PFF #200 means opportunity is uncertain. Low-cost stash with scheme-dependent upside.",
  "james thompson jr.": "Thompson's 10.82% run stop rate is the primary positive signal in his profile — above-average for the class — but his 7.2% win rate and 4.4 productivity suggest limited pass rush contribution. The 10%/1% probabilities are consistent with a run-stopping specialist who needs starter snaps to generate IDP value. In a 3.5pts/tackle scoring system, his run stop rate predicts meaningful tackle accumulation if deployed against run-heavy offenses. Late stash with scheme-dependent ceiling.",
  "dontay corleone": "Corleone's 13.33% run stop rate is the highest of any DT outside the top-6 — and among the best in the entire class — paired with 9.8% pass rush win rate from PFF #55. The 9%/1% probability is one of the most striking model undervaluations in the DT class given his two-way metrics. A 9.8% win rate plus 13.33% run stop rate from a day-2 pick should produce far more than 9% useful probability. Either the model is finding a consistency red flag not in the summary stats, or Corleone is one of the highest-value DT bets in the class. Worth researching further before auction.",
  "darrell jackson jr.": "Jackson's 13.57% pass rush win rate and 8.9% run stop rate from PFF #101 are among the best balanced metrics in the entire DT class. The 9%/1% probabilities represent one of the most extreme metric-vs-probability divergences in the draft. Either the model has flagged a major inconsistency in his production data, or Jackson is dramatically underpriced at auction. His metrics independently suggest a 20%+ useful probability tier. High-intrigue research target — if you can validate his production quality, this may be the best DT value in the class.",
  "cj allen": "Allen's 71 tackles and 39 stops with a 75.8 defensive grade form the class's top LB profile at 85%/75% — one of the highest probability pairs in the entire draft. In IDP scoring with 2.5–3.5pts/tackle and bonus points for stops, volume LBs with above-average stop rates are the cornerstone fantasy assets. His PFF #14 rank confirms both the model's assessment and the NFL scouts' evaluation. The combined model's agreement between grade quality and production volume is its strongest possible signal. He's the LB anchor and should command premium auction pricing.",
  "arvell reese": "Reese's 37 tackles and 34 stops — a 92% stop rate — is the standout metric driving his 74%/65% probability. Near-universal stop efficiency means every tackle he makes is a scoring play in IDP formats that reward defensive stops. PFF #7 rank places him in the top-10 overall, confirming elite consensus agreement with the model. The combined approach is weighting his stop efficiency as heavily as volume, and the result is a near-perfect IDP profile. His absolute tackle count is lower than Allen, but his stop quality may make him the better per-game scorer.",
  "anthony hill jr.": "Hill's 73 tackles and 44 stops at PFF #44 represent starter-level production volume from a day-2 prospect — 60% stop rate is above average for the class. The combined model produces 70%/58%, placing him in the elite LB tier despite a rank outside the top-25. The model is seeing production quality that scouts haven't fully rewarded in his consensus position, creating potential auction value. In IDP scoring, his tackle volume is the primary weekly floor driver. If he earns starter snaps early, his PPG production should be immediate and consistent.",
  "sonny styles": "Styles's 88.6 defensive grade is the highest in the LB class — a dominant scouting signal in the combined model — paired with 71 tackles and 47 stops (66% stop rate). The 64%/56% probabilities at PFF #5 reflect a player where both model inputs align strongly. His grade quality and stop rate together predict both volume and efficiency at the NFL level. At 9.9 projected PPG, he's the highest-ceiling LB in the class by this model. In IDP scoring that rewards stops and tackles, his profile is ideal — the grade predicts quality, and the production predicts volume.",
  "jake golday": "Golday's 82.4 defensive grade and 70 tackles with 43 stops at PFF #51 form a well-rounded profile the combined model values at 55%/50%. His 50% star probability means the model is nearly coin-flip on whether he reaches elite dynasty LB status — significant upside for a day-2 pick. His tackle volume (70) is consistent with a full-time starter, and his grade quality suggests he'll maintain that role. In IDP scoring, a starter-level LB with an 82+ defensive grade and 70+ annual tackles is a core dynasty asset.",
  "jacob rodriguez": "Rodriguez's 93.0 defensive grade — the highest of any player in the entire LB top-15 — paired with 94 tackles and 70 stops (74% stop rate) from PFF #84 is the most compelling production-grade alignment in the LB class. The 55%/50% probability mirrors Golday's despite dramatically stronger metrics, suggesting the model is applying a heavy rank discount at PFF #84. His grade, volume, and stop efficiency all point toward a starter who should outperform his probability significantly. One of the strongest buy recommendations in this entire draft.",
  "kyle louis": "Louis's 83.4 defensive grade and 75 tackles with 57 stops (76% stop rate) from PFF #95 continues the LB class pattern of the model finding elite value well below consensus. The 55%/50% probabilities from PFF #95 represent significant value tension — a 76% stop rate with 75 tackles is a dominant IDP production profile at any rank. In a scoring system that values defensive stops, his weekly floor is very high if he earns starter reps. Like Rodriguez, his rank discount creates a potential auction steal.",
  "josiah trotter": "Trotter's 72.7 defensive grade and 66 tackles with 40 stops at PFF #60 is a solid if unspectacular profile that the combined model rates at 50%/46%. His grade is the weakest of the top-8 LBs, which explains why his probabilities trail several lower-ranked peers with better metrics. A 50% star probability still represents meaningful upside for a day-2 pick. His tackle volume is reliable, but the defensive grade limitation suggests his ceiling is as a quality starter rather than an elite IDP anchor.",
  "deontae lawson": "Lawson's 78.1 defensive grade and 65 tackles with 46 stops (71% stop rate) from PFF #89 continues the LB pattern of strong metrics at undervalued ranks. The 41%/38% probability is well above his consensus position, with the combined model finding consistent signal across both grade and production. His 71% stop rate is legitimately strong — predicting efficient tackling rather than just volume accumulation. In IDP scoring, stop rate efficiency is more valuable than raw tackle count; Lawson's profile suggests sustainable weekly production.",
  "taurean york": "York's 83.7 defensive grade and 44 stops on 56 tackles (79% stop rate) from PFF #121 represents the best stop efficiency in this LB tier. The 25%/13% probability reflects the model's clear tier break below the top-9 LBs, but his 79% stop rate and grade quality suggest he could outperform this tier. In IDP scoring, every tackle being a stop maximizes points-per-tackle value. His profile is a quality starter who may become a focal point if the higher-ranked LBs disappoint. Good value at late-auction prices.",
  "keyshaun elliott": "Elliott's 67.8 defensive grade is the lowest of the LB top-15, but 75 tackles and 46 stops (61% stop rate) show consistent volume production that the combined model appropriately values at 25%/13%. His tackle accumulation is the primary fantasy value driver — the lower grade simply means the model isn't projecting elite performance, just consistent starter-level output. In a scoring system that values volume, a high-snap-count LB who makes 75+ tackles can be a meaningful weekly contributor regardless of grade quality.",
  "aiden fisher": "Fisher's 80.7 defensive grade and 79 tackles with 47 stops (59% stop rate) from PFF #151 represent above-average production volume for a deep prospect. The 25%/13% probability reflects the tier alongside York and Elliott, but Fisher's tackle count (79) is the highest of the group. His stop rate is below average for this tier, suggesting some of his tackles are allowing gains rather than preventing them. Volume is his primary value driver; in IDP formats, 79 tackles per season from a starter translates to meaningful weekly production.",
  "red murdock": "Murdock's 91.2 defensive grade — second-best in the LB class — and 94 tackles with 63 stops (67% stop rate) from PFF #188 may be the single most extreme model undervaluation in the entire draft. A 91.2 defensive grade with 94 tackles should generate 50%+ useful probability, not 25%/13%. The model is applying a massive discount for his rank and presumably his competition level. If even a portion of his metrics translate to NFL production, he represents extraordinary value at near-zero auction cost. The combination of elite grade, elite volume, and elite stop rate demands further investigation.",
  "trey moore": "Moore's 64.6 defensive grade is the lowest combined value in the LB top-15, and his limited tackle count (22 tackles, 17 stops) suggests limited opportunity or role rather than quality per opportunity. The 19%/10% probabilities are consistent with a situational player who hasn't yet demonstrated starter-level production. His grade and volume both limit the model's ability to project consistent IDP value. Not a priority dynasty asset in 8-team formats.",
  "harold perkins jr.": "Perkins's 76.7 defensive grade and 48 tackles with 35 stops (73% stop rate) from PFF #167 form a strong efficiency profile at modest volume. The 19%/10% probabilities undervalue his stop efficiency — 73% is in the elite tier for this class. His limited tackle count (48) reflects opportunity constraints rather than inability to produce when given snaps. If he earns a larger role at the NFL level, his stop rate suggests his per-snap production would scale significantly. Potential late-auction steal if he lands in a scheme where he can play full-time.",
  "mansoor delane": "Delane's 90.5 defensive grade and 15.22 QB rating against — the lowest in the CB class — confirm true shutdown coverage ability. The grade_only model gives him 57%/9%, the highest CB probability pair, because both inputs align at elite levels. When QBs complete passes at a 15 passer rating against you, they've effectively stopped throwing your way. In IDP scoring where coverage dominance converts to INT/forced-fumble opportunities (6pts each), Delane's profile generates the highest-value scoring events. He's the clear CB1 and a top-5 IDP pick regardless of position.",
  "avieon terrell": "Terrell's 83.5 defensive grade and 10 pass breakups — joint-highest in the class — with a 20.14 QB rating against form the class's second-tier CB profile at 46%/6%. His 10 breakups suggest he generates active coverage disruption even when targeted, which in IDP formats creates consistent scoring events. The grade_only model is crediting both his overall defensive quality and his playmaking production. PFF #18 rank ensures early NFL playing time, which is the primary variable for CB IDP relevance. Strong starter probability with INT-upside.",
  "colton hood": "Hood's 79.2 defensive grade and 31.82 QB rating against from PFF #38 form a solid day-2 starter profile. The 45%/6% probabilities are consistent with a quality starting CB who limits his opponents without dominating them. His grade is below the elite tier, which caps his ceiling in a grade_only model. In IDP scoring, his profile projects as a consistent tackle accumulator with modest turnover upside — a reliable floor rather than a week-winning ceiling. Solid depth pick at auction.",
  "brandon cisse": "Cisse's 75.2 defensive grade is below the CB class median but his 7 pass breakups at PFF #35 show consistent coverage production. The 42%/5% probabilities reflect a player where the rank is doing more work than the grade quality — a day-2 pick who should earn starting reps. His 60.11 QB rating against is moderate, suggesting QBs have had some success targeting him. The grade_only model is appropriately cautious about his coverage ceiling while crediting his draft position for opportunity. Reliable floor with limited upside.",
  "d'angelo ponds": "Ponds's 89.9 defensive grade — elite, nearly matching Delane's 90.5 — and 10 pass breakups tied for class-best at PFF #52 should generate stronger model confidence than 42%/5%. The grade says elite CB; his 45.0 QB rating against says QBs have had moderate success. The grade_only model is correctly noting the tension between elite technique (grade) and moderate outcomes (passer rating). In IDP formats, his grade quality and breakup production both predict active coverage plays. Buy the grade with the understanding that his passer rating conceded is the uncertainty anchor.",
  "keionte scott": "Scott's 89.6 defensive grade is nearly identical to Ponds but his 4 pass breakups is the lowest of the top-6 CBs. The 41%/5% probabilities reflect that limited breakup production constrains the model's scoring event prediction. In IDP formats where individual plays matter (INT, PBU), a high grade with low breakup output creates PPG floor uncertainty. His defensive grade strongly predicts quality coverage; the low breakup total suggests he's limiting targets rather than creating turnovers — a high-IDP-floor, lower-ceiling profile.",
  "chris johnson": "Johnson's 13.06 QB rating against — effectively a shutdown corner — and 91.6 defensive grade (class-highest) from PFF #56 may be the most undervalued CB profile in this class. The grade_only model produces 41%/5% — in the same tier as Ponds and Scott — but Johnson's combination of class-best grade and near-lowest QB rating against suggests his true ceiling is significantly higher than the model reflects. When quarterbacks simply stop throwing at you (13 passer rating), every snap is generating value through non-statistical coverage dominance. Strong buy recommendation at mid-auction prices.",
  "davison igbinosun": "Igbinosun's 81.5 defensive grade and 27.6 QB rating against with 8 pass breakups form a well-rounded CB2 profile the model rates at 38%/5%. His three metrics are all consistently above average — no major strengths, no weaknesses — which the grade_only model rewards with reliable starter probability. PFF #63 rank places him in the day-2/3 range with competitive starting opportunities. A dependable depth CB who projects as a quality starter with consistent IDP contributions rather than a week-winning ceiling.",
  "treydan stukes": "Stukes's 90.1 defensive grade — second-only to Johnson in this class — and 21.99 QB rating against from PFF #105 creates one of the most compelling grade-to-rank value opportunities in the CB group. The 34%/4% probabilities significantly undervalue his grade quality relative to the top-tier CBs. His 6 pass breakups confirm the grade-predicted coverage ability is producing real outcomes. In IDP scoring, near-elite defensive grades predict both coverage dominance and turnover generation. This may be the highest surplus value CB in the class at auction.",
  "malik muhammad": "Muhammad's 78.5 defensive grade and 9 pass breakups — joint-second highest in the class — from PFF #114 show a volume breakup producer with average grade. The 33%/4% probabilities credit his active coverage production while noting the grade limitation. In IDP formats, pass breakups and INTs are the primary scoring events for CBs; his breakup count (9) predicts consistent PBU production at the NFL level. His grade deficit limits his overall ceiling, but breakup volume provides a reliable IDP floor.",
  "chandler rivers": "Rivers's 90.7 defensive grade — the highest of the CB #11-15 group — but 54.81 QB rating against and 6 breakups from PFF #73 presents a grade/outcome tension. The 31%/4% probabilities are appropriately modest for this combination. His defensive grade says elite technique; his coverage stats say QBs have had moderate success. In the grade_only model, the grade signal is strong but the coverage outcome data is pulling the probability down. Worth watching whether his grade or his passer rating conceded better predicts NFL performance.",
  "jalon kilgore": "Kilgore's 69.7 defensive grade — below average for this class — but 9 breakups from PFF #154 suggest a high-volume coverage disruptor who generates plays through physical positioning rather than elite technique. The 31%/4% probabilities are slightly above what his grade alone would produce, with the breakup production adding the incremental model signal. In IDP formats, his breakup volume is the primary value driver. His lower grade means the model expects some of those breakups to be contested rather than clean coverage wins.",
  "daylen everette": "Everette's 73.4 defensive grade and 68.29 QB rating against suggest he's a CB who allows moderate success when targeted — QBs aren't deterred from throwing his way. His 7 breakups keep the passer rating from being worse. The 30%/3% probabilities from PFF #76 reflect a quality depth CB who projects as a starter but not a top fantasy IDP asset. His profile in IDP scoring: moderate tackle contribution, occasional coverage play, limited elite event generation. Reliable floor at low auction cost.",
  "keith abney ii": "Abney's 86.3 defensive grade and 9 breakups at PFF #40 are quality metrics, but the 28%/3% probabilities are below what a #40 pick with an 86+ grade normally generates. The model may be discounting for seasonal inconsistency in his production data. His grade quality and consensus rank both suggest a starting NFL CB with early opportunity; the model's skepticism introduces appropriate uncertainty. Buy based on his grade and draft position; the model's discount creates potential auction value.",
  "tj hall": "Hall's 78.3 defensive grade and 9 breakups from PFF #248 represent solid metrics from an extremely deep prospect — the most extreme grade-to-rank value opportunity in the CB class. The 27%/3% probabilities from PFF #248 reflect the model's uncertainty about NFL opportunity, but if the grade is accurate, Hall's production potential is significantly higher than his draft position suggests. In dynasty formats, UDFA-range CBs who make rosters can be acquired for nothing and contribute meaningfully. Near-zero auction cost with real tape backing it.",
  "dillon thieneman": "Thieneman's 91.0 defensive grade and 90.2 run defense grade with 6 INTs — the class-highest — form the strongest safety profile in this draft. The pff_only model projects 77%/19% and a 12.0 PPG ceiling, driven by elite grades on both coverage and run defense. In IDP scoring where INTs earn 6pts, a safety who combines elite grades with the highest INT total in the class has the highest weekly ceiling of any S in the pool. PFF #15 rank confirms the model's top-S designation. He's the unambiguous S1 and a top-10 IDP pick overall.",
  "caleb downs": "Downs's 87.9 defensive grade and 86.4 run defense grade at PFF #3 overall — third-highest consensus rank in the entire class — confirm elite safety prospect status at every level of evaluation. The pff_only model projects 75%/18%, nearly matching Thieneman from a better overall rank, because the model is grade-calibrated rather than rank-calibrated. His 2 INTs are the only modest signal; his grades on both coverage and run defense are elite. In IDP formats where grade quality predicts consistent weekly production, Downs is the high-floor S1 co-anchor with Thieneman.",
  "emmanuel mcneil-warren": "McNeil-Warren's 95.0 run defense grade — the highest of any safety in this class — makes him the primary value play based on the pff_only model's 73%/18% projection from PFF #27. In IDP scoring where tackles earn 2pts for safeties, a safety with a 95.0 run defense grade will generate massive tackle opportunities in a box role. His 91.9 overall grade confirms the run defense dominance isn't purchased at the expense of coverage quality. His 2 INTs are modest but the tackle volume he'll generate more than compensates. Best safety value play in the class relative to auction price.",
  "a.j. haulcy": "Haulcy's 86.6 defensive grade and 85.6 run defense grade with 5 INTs at PFF #47 is the class's most complete safety profile outside the top-3. At 68%/17%, the pff_only model sees a well-rounded starter with genuine INT-generating ability. His 5 INTs predict active coverage engagement that produces the highest-value IDP scoring events (6pts each). PFF #47 rank places him in day-2 territory where starting roles are achievable. In a format where safeties generate both tackles and turnovers, Haulcy's profile maximizes all scoring categories.",
  "zakee wheatley": "Wheatley's 85.9 defensive grade and 87.7 run defense grade with 3 INTs from PFF #98 is the class-defining value play at safety. The pff_only model produces 65%/16% — strong starter probability from a day-3 prospect whose grades rival day-1 starters. His run defense grade (87.7) is the third-best in the class, predicting significant tackle production in a starting box safety role. In IDP scoring, his combination of tackle upside and grade quality at near-zero auction cost represents the highest potential surplus value of any safety in the class.",
  "genesis smith": "Smith's 81.1 defensive grade and 72.9 run defense grade with 3 INTs at PFF #100 form a balanced safety profile with slight coverage orientation. The 57%/14% probabilities are above median for day-3 picks, reflecting the pff_only model's grade confidence. His run defense grade (72.9) is the weakest of the top-6 safeties, suggesting he's primarily a coverage safety rather than a box presence — which in IDP tackle-heavy scoring slightly limits his floor compared to run-stopping peers. Solid value at low auction cost with coverage-play upside.",
  "kamari ramsey": "Ramsey's 79.4 defensive grade and 80.4 run defense grade with 1 INT from PFF #64 form a consistent but not elite safety profile. The 56%/14% probabilities mirror Smith from a better rank position, but Ramsey's grades are slightly lower and his 1 INT is the lowest of the top-7. The pff_only model is grade-driven, and his grades are in the solid-but-not-special range. His PFF #64 rank ensures early NFL opportunity, which is the primary driver for generating the tackle volume that makes safeties valuable in IDP formats. Reliable starter with limited scoring-event upside.",
  "bud clark": "Clark's 89.8 defensive grade — second only to McNeil-Warren in the safety class — and 83.1 run defense grade with 4 INTs from PFF #118 creates one of the most compelling grade arbitrage opportunities in the entire class. The 52%/14% probabilities significantly undervalue his grade quality. A 89.8 defensive grade from PFF #118 is the type of signal the pff_only model was specifically designed to surface — elite tape from a player ranked well below his ability level. His 4 INTs provide scoring-event upside to complement his tackle floor. Strong recommend at near-zero auction cost.",
  "robert spears-jennings": "Spears-Jennings's 93.1 run defense grade — second only to McNeil-Warren — and 78.7 overall grade with 1 INT from PFF #201 make him primarily a run-stopping safety whose tackle accumulation will be the dominant IDP value driver. The 47%/13% probabilities from PFF #201 represent strong value. His 93.1 run defense grade predicts he'll be heavily deployed against running plays, generating consistent tackle production. The 1 INT limits his scoring-event ceiling but his tackle floor is very high if he plays a box safety role. Great floor pick at minimal cost.",
  "lorenzo styles jr.": "Styles's 66.0 defensive grade and 71.0 run defense grade with 0 INTs from PFF #232 are the weakest metrics of any named safety in this top-15 group. The 43%/12% probabilities are higher than his metrics suggest, which likely reflects the pff_only model finding additional value in his athletic profile or usage context not captured in the three summary stats. With below-average grades on both inputs and zero INTs, the honest answer is that the model's confidence is built on thin grounding here. High-variance deep stash — the upside is real but the data support is limited.",
  "jalen stroman": "Stroman's 79.8 defensive grade and 81.2 run defense grade with 1 INT from PFF #153 form a balanced, reliable safety profile in the day-3 range. The 36%/11% probabilities are appropriate for his grades and rank. His run defense grade (81.2) predicts meaningful tackle contribution in a starting role. No major tensions in the model — a consistent player who profiles as a quality depth contributor with a clear path to starter-level IDP production if given the opportunity. Low auction cost with a realistic weekly floor.",
  "vj payne": "Payne's 73.3 defensive grade and 70.5 run defense grade with 2 INTs from PFF #204 are below the safety class median on all measures. The 36%/11% probabilities match Stroman's from a deeper rank with weaker grades, suggesting the model may be finding value not captured in the three summary inputs. His grade deficit limits his projected NFL role and the tackle volume that drives weekly IDP production. Borderline dynasty consideration — only relevant in deeper formats where roster spots allow development speculations.",
  "cole wisniewski": "Wisniewski's 83.9 defensive grade and 87.3 run defense grade with 0 INTs from PFF #181 make him a strong tackling, run-stopping safety with zero ball production. The 32%/11% probabilities reward his grade quality while appropriately noting the complete absence of INT production. In IDP formats where INTs score 6pts, a safety who never generates turnovers has a lower weekly ceiling regardless of tackle volume. His tackles will be consistent; his upside scoring events will not materialize. Floor player with limited ceiling.",
  "isaiah nwokobia": "Nwokobia's 88.0 defensive grade — elite, top-4 in the safety class — and 83.5 run defense grade with 4 INTs from PFF #199 may be the single best grade-to-rank value in the entire safety class. The 32%/11% probabilities significantly undervalue a player whose defensive grade rivals the top-tier safeties. His combination of 88.0 overall grade, 4 INTs, and above-average run defense from PFF #199 creates an extraordinary surplus value opportunity at near-zero auction cost. If his grades are accurate, he's producing at a level that his rank dramatically underrepresents.",
  "jalen catalon": "Catalon's 79.4 defensive grade and 5 INTs — the highest INT total of any named safety outside Thieneman — from PFF #257 is a high-turnover profile at a near-undrafted rank. The 31%/10% probabilities reward his ball-production rate while reflecting deep-rank uncertainty about NFL opportunity. In IDP formats where INTs score 6pts, a safety who generates 5 INTs in a season has week-winning potential regardless of tackle contribution. His injury history almost certainly explains the low rank; if healthy and active, his turnover rate makes him a genuine IDP scoring threat at zero auction cost.",
};

  combined:'<strong>Best of both worlds.</strong> This position benefits most from combining PFF rank with college production. Stats are volume-weighted so high-usage seasons carry more weight. Both ranking and sustained production matter.',
};
const PPG_THRESHOLDS={QB:[15,20],RB:[10,15],WR:[10,15],TE:[10,15],DE:[10,15],DT:[10,15],LB:[10,15],CB:[10,15],S:[10,15]};
const MDL_LABELS={pff_only:'PFF',stats_only:'STAT',combined:'COMB'};
const MDL_COLORS={pff_only:'rgba(74,200,245,.15)',stats_only:'rgba(212,245,74,.12)',combined:'rgba(167,139,250,.15)'};

let players=PLAYERS.map(p=>({...p}));
players.forEach(p=>{if(!p.predicted_max_ppg&&p.blended_ppg)p.predicted_max_ppg=p.blended_ppg;});
let filtered=[],pos='ALL',sort='pff',page=1,sel=null;
const PER=30;

function scoreColor(s){return s>=75?'#d4f54a':s>=50?'#4ac8f5':'#8891a8';}
function impactColor(s){return s>=60?'var(--accent)':s>=40?'var(--accent2)':s>=20?'var(--muted2)':'var(--accent3)';}
function impactLabel(s){return s>=60?'Elite':s>=40?'Strong':s>=20?'Developmental':'Minimal';}

function recompute(){
  const byPos={};
  players.forEach(p=>{(byPos[p.position]||(byPos[p.position]=[])).push(p.predicted_max_ppg);});
  Object.keys(byPos).forEach(pos=>{
    const vals=[...byPos[pos]].sort((a,b)=>a-b);
    const mn=vals[0],mx=vals[vals.length-1],rng=mx-mn;
    players.filter(p=>p.position===pos).forEach(p=>{
      p.draft_value=rng===0?50:Math.round((p.predicted_max_ppg-mn)/rng*100);
    });
  });
}

function filter(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  filtered=players.filter(p=>{
    if(pos!=='ALL'&&p.position!==pos) return false;
    if(q&&!p.display_name.toLowerCase().includes(q)) return false;
    return true;
  });
  filtered.sort((a,b)=>{
    if(sort==='impact') return (b.impact_score||0)-(a.impact_score||0);
    if(sort==='auction') return (b.proj_price||0)-(a.proj_price||0);
    if(sort==='value') return (b.value_gap||0)-(a.value_gap||0);
    if(sort==='pff') return a.pff_rank-b.pff_rank;
    if(sort==='ppg') return b.predicted_max_ppg-a.predicted_max_ppg;
    if(sort==='useful') return (b.prob_useful||0)-(a.prob_useful||0);
    if(sort==='star') return (b.prob_star||0)-(a.prob_star||0);
    if(sort==='modelrank') return (a.model_overall_rank||9999)-(b.model_overall_rank||9999);
    if(sort==='name') return a.display_name.localeCompare(b.display_name);
    return 0;
  });
  page=1;render();
}

function setPos(p,btn){
  pos=p;
  document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filter();
}

function onSortChange(){
  sort=document.getElementById('sortSelect').value;
  filter();
}

function render(){

    const uTxt=p.prob_useful!=null?p.prob_useful+'%':'—';
    const ppgTxt=p.type==='FA'?((p.blended_ppg||0).toFixed(1)):((p.predicted_max_ppg||0).toFixed(1));
    const ppgCol=p.type==='FA'?'var(--accent2)':impCol;

    const on=sel&&sel.name===p.name?' active':'';
    const priceHtml=p.proj_price>1?

       p.value_label==='slight_value'?'<span style="font-size:9px;color:var(--accent2);margin-left:2px">▲</span>':
       p.value_label==='overpriced'?'<span style="font-size:9px;color:var(--accent3);margin-left:2px">▼</span>':
       p.value_label==='slight_over'?'<span style="font-size:9px;color:#f59e0b;margin-left:2px">▼</span>':'')+
      '</div>':'';
    return '<div class="p-card'+on+'" onclick="selectPlayer(\''+safeName+'\')">'+

        '<div>'+

            '<span class="pos-chip" style="background:'+col+'1a;color:'+col+'">'+p.position+'</span>'+
            ' &nbsp;'+p.total_games+' games'+
          '</div>'+

            '<div class="metric-val" style="color:'+impCol+'">'+imp+'</div>'+

          )+
        '</div>'+
        '<div class="metric-block">'+
          '<div class="metric-lbl">Useful%</div>'+

function renderPagination(total){
  const pages=Math.ceil(total/PER);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return;}
  let s=Math.max(1,page-2),e=Math.min(pages,s+4);
  if(e-s<4) s=Math.max(1,e-4);
  let h='';
  if(page>1) h+='<button class="pg-btn" onclick="goPage('+(page-1)+')">‹</button>';
  for(let i=s;i<=e;i++) h+='<button class="pg-btn'+(i===page?' on':'')+'" onclick="goPage('+i+')">'+ i+'</button>';
  if(page<pages) h+='<button class="pg-btn" onclick="goPage('+(page+1)+')">›</button>';
  document.getElementById('pagination').innerHTML=h;
}

function goPage(p){page=p;render();document.getElementById('scrollArea').scrollTo(0,0);}

function posRank(p){
  return players.filter(x=>x.position===p.position).sort((a,b)=>b.draft_value-a.draft_value).findIndex(x=>x.name===p.name)+1;
}
function pffPosRank(p){
  return players.filter(x=>x.position===p.position).sort((a,b)=>a.pff_rank-b.pff_rank).findIndex(x=>x.name===p.name)+1;
