  "zxavian harris": "Harris is one of the most unusual physical specimens in this draft class — 6'8\", 330 lbs is simply not a typical DT profile, and that size pushes him toward a true space-eater nose tackle designation. His 24 total pressures and 8.1% run stop rate show some functional production at the college level, and his pass rush grade of 64.3 is limited but not disqualifying. The model flags the overweight concern (330 lbs historically cuts the useful rate to 21%), and without RAS or athleticism data to offset it, the 6% useful probability reflects the real uncertainty. At his size, the fantasy ceiling is capped by his scheme fit — he needs a team that values a true two-gap nose tackle who can occupy blockers, not generate stats. His height alone (100th percentile) makes him a practice squad curiosity, but dynasty investment beyond the deepest rosters isn't warranted.",
  "james thompson jr.": "Thompson doesn't have combine data available, which hurts the overall projection, but his college production gives something to work with — 18 total pressures, a 10.82% run stop rate that ranks among the better marks in this class, and a 7.2% pass rush win rate showing some two-phase contribution. His pass rush grade of 66.6 is modest, and the model is directionally bearish (5% useful) with a PFF rank of 236 suggesting limited confidence in his NFL projection. The run stop rate is the clearest positive signal here and may point toward value as a nose tackle or early-down run defender in the right system. Without size or athleticism data, it's hard to project his role with any precision. Thompson is a late-round flyer whose best-case scenario is developing into a reliable run stopper in a heavy front.",
  "dontay corleone": "Corleone is a powerful interior presence — at 6'1\", 340 lbs he's built like a traditional nose tackle and his college production supports that force-of-nature profile. A 13.33% run stop rate is excellent, and 27 total pressures with a 9.8% pass rush win rate show he's not just a space-eater — he can disrupt the pocket too. His 82.9 pass rush grade is the second-highest in this group, which is a legitimately strong signal. The tension here is the overweight flag: at 340 lbs without RAS data, the model historically projects meaningful reductions in useful and star outcomes (21% and 5% respectively), and the scout grade of 0.2 is a significant drag. His 6'1\" height means he's working with limited leverage, and NFL interior linemen will test that frame immediately. The production is real, but dynasty investment should be tempered by the size concerns and the scheme-dependent nature of nose tackle fantasy value.",
  "darrell jackson jr.": "Jackson is a lengthy interior rusher at 6'6\", 315 lbs — a frame that mirrors Caleb Banks at the top of this class — and his pass rush numbers back up the big-body projections. A 13.57% pass rush win rate is the highest in this DT group, and 30 total pressures with a 7.42 pass rush productivity score show he can turn length into production at a consistent clip. His pass rush grade of 72.3 is solid without being elite, and his run stop rate of 8.9% is functional. The model reads him directionally as limited (22% useful), which is likely weighed down by his PFF rank of 101 — solid but not in the top tier. No RAS available, but the combination of size and pass rush win rate is the kind of profile that translates when landing in a wide-9 or even an edge-oriented role. Jackson is a sneaky dynasty target if he gets deployed in a pass-rush heavy scheme where his reach can cause havoc from the interior.",
  "cj allen": "Allen projects as a three-down MIKE linebacker with solid tackle volume — 71 stops and 39 defensive stops in his final college season paint a picture of a reliable, down-hill thumper who can log meaningful snaps early. His 4.9% missed tackle rate is clean, and four sacks show he can contribute on the pass rush, though his 45% coverage snap rate suggests he'll be asked to drop into zones regularly. The honest caveat here is that LB is genuinely one of the positions where the model has its weakest predictive footing — CV R² of +0.070 means we're working with signal-adjacent noise more than anything definitive. At 6'1\"/230 lbs he's a standard MIKE build, and his 75.8 PFF defensive grade is respectable without being elite. Fantasy upside lives or dies with how his NFL team uses him — if he lands in a high-snap MIKE role, the tackle volume is there; if he gets bumped outside or loses out on third downs, the floor evaporates fast.",
  "arvell reese": "Reese is a 3-4 OLB pass rusher first and everything else second — eight sacks off just 37 tackles in college tells you exactly who he is and what the NFL will pay him to do. At 6'4\"/241 lbs with a 4.46 forty, the physical tools are legitimately elite for the position, and his 76.5 PFF grade reflects a player who wins in a phone booth. The wrinkle for fantasy is that a sack-specialist profile is among the least reliable for IDP purposes; tackle volume, not sack totals, drives LB scoring, and his 39% coverage snap rate suggests limited three-down usage. His weight drew a size flag relative to historical IDP comps — heavier OLBs historically produce useful fantasy seasons at about half the rate of standard builds. Layered on top of all that, LBs are where the model genuinely struggles to project — even with strong physical comps, the scheme dependency at this position makes confident predictions pretty thin.",
  "anthony hill jr.": "Hill is the rare LB who combines legitimate run-stop volume with pass-rush pop — 73 tackles, six sacks, and a 2.9% missed tackle rate that's best in this entire class make his college tape legitimately impressive. His 9.84 RAS is a 99th-percentile athleticism score, and 47% coverage snap rate means he's been trusted in all three phases. The PFF grade of 72.9 is fine, not special, and the 44 defensive stops suggest quality over sheer stuffing numbers. Worth being upfront: LB is the position where this model has the least confidence — the CV R² barely clears zero, and scheme fit will matter far more than anything the numbers capture. Hill profiles as a versatile off-ball LB who can play MIKE or WILL depending on the scheme; in a high-snap role he has a credible ceiling, but his fantasy value depends entirely on how his NFL coordinator uses a day-two pick at this position.",
  "sonny styles": "Styles is the most physically freakish LB in this class and it's not particularly close — a perfect 9.99/10 RAS, 4.46 speed, a 43.5-inch vertical, and 6'5\"/244 lbs of frame place him in a tier most linebackers never approach athletically. On top of that, his 88.6 PFF defensive grade was genuinely elite, paired with 71 tackles, six sacks, and a 2.2% missed tackle rate that speaks to clean, disciplined technique. His 47 defensive stops at 49% coverage snap rate confirm he's being asked to do everything. The size flag (244 lbs) is a real consideration — historically heavier off-ball LBs have lower useful-season rates, though his elite athleticism partially offsets that concern. Even with all this in his favor, LB projection is the honest weak link in the model — scheme deployment will ultimately determine whether his ceiling is realized, and that's something no stat sheet can tell you in advance.",
  "jake golday": "Golday is a long, high-motor LB with an intriguing combination of size and athleticism — 6'5\"/239 lbs with a 9.74 RAS and above-average agility scores. His 70 tackles, four sacks, and 82.4 PFF grade paint a solid but not extraordinary profile, and his 43 defensive stops in 42% coverage snaps hint at a player whose role may skew more toward the box than underneath routes. The 6.46% missed tackle rate is a concern — that's the highest in the top tier of this class — and it could limit his effectiveness as a reliable IDP tackle accumulator. His PFF rank of 51 slots him as a mid-round prospect, and the model's limited predictability at LB means draft-day slot probably matters less than where he ends up schematically. A MIKE role in a 4-3 base system would suit his frame well; as a pass rusher on the edge, the lack of elite speed (4.62 forty) limits his upside.",
  "jacob rodriguez": "Rodriguez put up some of the most impressive raw college numbers in this entire LB class — 94 tackles, 70 defensive stops, and a 93.0 PFF defensive grade that frankly jumps off the page. His 9.52 RAS, 6.90 three-cone, and 4.19 shuttle show he's a legitimate athlete who can move in space, which makes the 6'1\"/231 frame feel workable as a MIKE who can get to the second level cleanly. The disconnect between his elite college production and his PFF rank of 84 reflects a reality that often surfaces at LB: measurables and draft capital don't always align with what players do on tape. Worth flagging honestly — LB is the position where the model has the weakest predictive track record, and a player posting a 93.0 grade but landing late in the draft likely has scheme or athleticism concerns scouts are weighting differently. If he lands in a scheme that keeps him near the ball, the tackle volume history is genuinely encouraging.",
  "kyle louis": "Louis is a compact, quick LB who compensates for his light 220-lb frame with elite agility — his 9.10 RAS, 129-inch broad jump (94th percentile), and respectable 4.53 forty suggest a player who can cover ground in both run fits and underneath zones. The 75 tackles and seven sacks show he can contribute across phases, but an 8.72% missed tackle rate is a real red flag for an IDP linebacker whose primary value comes from tackle accumulation. His 220-lb weight sits at just the 4th percentile for the position, which is a legitimate durability and run-defense concern at the NFL level. The model's confidence at LB is genuinely low — this is a position where projections have weak explanatory power and scheme fit can swing outcomes dramatically. Louis profiles best as a WILL in a pass-heavy system, but his IDP floor is fragile if he's asked to fill gaps against NFL-caliber offensive linemen.",
  "josiah trotter": "Trotter carries a name that means something in this league, but the eval here is purely on his own numbers — and they're mixed. He logged 66 tackles and three sacks on a modest 72.7 PFF grade, with a 7.1% missed tackle rate that's a bit sloppier than you'd want from an every-down LB. The one thing that genuinely stands out is his 27-rep bench press, a 98th-percentile strength mark that suggests he's built to hold the point of attack physically even if the tape grades out average. At 6'2\"/237 lbs he has the frame for a three-down MIKE, but the PFF rank of 60 and modest defensive grade make him a developmental bet more than a projection with confidence. LB is where the model has the least traction predictively — the CV R² barely registers — so Trotter is genuinely more of a wait-and-see on scheme fit than a player the numbers can vouch for.",
  "deontae lawson": "Lawson is a long-framed LB at 6'3\" with pass-rush traits — four sacks, 46 defensive stops, and a 78.1 PFF grade that shows he can win as a pass rusher but hasn't yet established himself as a box coverage anchor. His 8.7% missed tackle rate is elevated and is the clearest flag in his profile; at 226 lbs (18th percentile for weight), he's going to face physical matchup problems in the run game at the next level. The 65-tackle total doesn't project as a high-volume IDP accumulator, which limits his dynasty floor in the near term. LB projections are where honest predictive humility matters most — this model has weak predictive power at the position, and a developmental player like Lawson has more of his ceiling determined by where he lands than by what his college stats show. He's best viewed as a rotational pass rusher who needs to add functional strength before he's a reliable three-down option.",
  "taurean york": "York is a stocky, high-effort run defender whose college production doesn't translate as cleanly as his 83.7 PFF grade might initially suggest — 56 tackles at 5'11\" is a useful profile in terms of positioning (he's near the ball), but his 7.27% missed tackle rate and below-average agility scores (7.32 three-cone, 4.48 shuttle) are genuine concerns for a player who needs to be an efficient tackler to justify roster space. He produced 44 defensive stops and four sacks across 53% coverage snaps, which hints at a player being used in multiple roles without fully excelling in any one. His PFF rank of 121 reflects the gap between his production quality and projection confidence. The LB model is particularly unreliable here — the combination of a late PFF rank, size concerns, and limited athleticism makes York a player whose ceiling is almost entirely scheme-dependent, and not in a comforting way.",
  "keyshaun elliott": "Elliott posted decent tackle volume — 75 stops and seven sacks — but a 67.8 PFF defensive grade that's among the lowest in this class undermines what the counting stats suggest. His missed tackle rate of 7.07% is manageable, and a 6'2\"/231 frame with solid athleticism markers (38-inch vertical, 125-inch broad) gives him a workable physical foundation. The sack total stands out and could make him interesting in a 3-4 scheme that features OLBs in pass rush, but the low defensive grade is a real concern for sustained NFL deployment. LB is the position where the model has its most limited predictive footing — a weak grade paired with a late draft slot (PFF rank 133) typically means scheme-dependent upside at best. Elliott is a dart throw in later dynasty rounds, worth a speculative add if his landing spot emphasizes pass rush from the linebackers.",
  "aiden fisher": "Fisher's college profile is defined by volume over efficiency — 79 tackles and 47 defensive stops sounds encouraging, but a 10.86% missed tackle rate is a real problem for an IDP linebacker whose value relies almost entirely on accumulating clean stops. His 80.7 PFF grade is fine in isolation, and his 53% coverage snap rate shows coaches trusted him in coverage, but there are no physical standouts (6'1\"/232 lbs, no measurables that jump out) to anchor a projection. The PFF rank of 151 places him firmly in the late-round/undrafted conversation, and honestly the LB model here has almost no predictive confidence — CV R² of +0.070 is a polite way of saying the stats are mostly noise for NFL projection purposes. Fisher needs a specific role and a specific scheme to justify IDP rostering, and without visibility into where he lands, the honest call is that there's more downside here than upside.",
  "red murdock": "Murdock is the most statistically interesting player in the late portion of this class — 94 tackles, 63 defensive stops, and a 91.2 PFF defensive grade are legitimately elite college numbers that almost nobody else in this group can match. Six sacks at 53% coverage snap rate shows he was a full-time contributor doing real work in all phases. The issue is that he has no combine data at all, which makes physical projection essentially impossible and likely explains why he's sitting at PFF rank 188 despite the production. LB is the position where the model acknowledges its weakest predictive grip — and for Murdock specifically, the absence of measurables makes the gap between the stats and the projection even harder to bridge. He's an undrafted FA type whose dynasty value depends entirely on whether an NFL coach sees the tape and gives him a real shot at snaps; the production says a player is in there, the draft capital question is legitimate.",
  "trey moore": "Moore's profile reads like a fringe edge/OLB tweener who hasn't settled into a clear role — just 22 tackles in his sample, 37% coverage snap rate, and a 15.4% missed tackle rate that's by far the worst in this class. His 8.70 RAS and 4.54 forty with a 243-lb frame suggest he's being evaluated as a pass rusher more than a MIKE, but three sacks off minimal snaps isn't exactly overwhelming. The size flag at 243 lbs compounds the coverage concerns; heavier LBs historically have worse useful-season rates, and Moore's athleticism (RAS is solid but not elite) doesn't fully offset that. LB is already where the model has its thinnest predictive foundation, and a player with this small a college sample and an elevated missed tackle rate adds another layer of uncertainty. He's a real developmental shot — the athleticism could emerge in the right scheme, but this is not a projection backed by any meaningful statistical confidence.",
  "harold perkins jr.": "Perkins is the quintessential high-upside, high-risk pass rusher — ten sacks on just 48 tackles and 44% coverage snaps tells you exactly how LSU deployed him, and it's a role that translates better to edge rusher than traditional LB in the NFL. His 76.7 PFF grade is solid, but a 13.15% missed tackle rate is a significant liability for anyone expecting him to generate IDP volume from tackle accumulation. At 6'1\"/223 lbs (10th percentile for weight), there are real questions about whether he can hold up as a box LB against NFL run concepts. The ten sacks are genuinely enticing, but sack-heavy, low-tackle LB profiles have poor historical IDP conversion rates — and LB is the one position where the model is most upfront about its limited predictive power. Perkins likely needs to either convert to a true edge role or find a 3-4 system that maximizes his pass rush without demanding too much run defense; his dynasty value is more of a futures bet than a near-term floor.",
  "mansoor delane": "The top-ranked CB in this model, Delane posted an elite 90.5 overall defensive grade with one of the most dominant coverage profiles in the class — a 15.22 QB rating against and 4 interceptions to go with 7 PBUs. He profiles as a press-capable boundary corner who can generate turnovers, which is exactly what you want in IDP dynasty given the 4-point INT scoring. His missed tackle rate of just 1.27% is outstanding, meaning he won't cost you on the stat sheet when he does engage. At 187 lbs he's a touch light, but the production speaks loudly. High floor, high ceiling — the model has him as the clear CB1 here with a 52% star probability.",
  "avieon terrell": "Terrell showed up in coverage all season, racking up 10 PBUs and limiting quarterbacks to a 20.14 rating against — elite disruption numbers that anchor his 83.5 overall grade. The 5'11\", 186 lb frame is right at the boundary starter threshold, and his 17-rep bench press (77th percentile) suggests he's more physical than his slender build implies. The 6.66% missed tackle rate is the one blemish worth noting, as you won't want to rely on him as a tackle producer in IDP. He projects as a zone-capable corner who can play boundary or rotate inside — versatile enough for most defensive schemes. Solid mid-range dynasty CB with a 47% star probability.",
  "colton hood": "Hood might be the best pure athlete in this CB class — a 9.61 RAS (96th percentile) headlined by a jaw-dropping 40.5-inch vertical (90th percentile) and a 4.44 forty. The production is respectable if not elite, with a 79.2 overall grade and a 31.82 QB rating against, and he chipped in 2 INTs plus 5 PBUs. His athleticism profile suggests he can play press-man on the boundary at the next level, and teams that like physical, sticky corners will covet him. The missed tackle rate of 6.6% is a minor concern for IDP tackle upside. The gap between his athletic ceiling and current production grade is where most of the dynasty risk lives.",
  "brandon cisse": "Cisse's coverage grade (75.2 overall) doesn't match his elite athleticism, posting a 60.11 QB rating against that ranks among the shakier numbers in this group. The upside is real, though — a 41.0-inch vertical (92nd percentile) and a 131-inch broad jump (86th percentile) give him the physical tools to become a quality boundary corner as his technique matures. He was better at containing than disrupting, generating just 1 INT on the season, but the 7 PBUs show he was in the right spots. His 3.14% missed tackle rate is a plus for IDP floor purposes. Cisse reads as a high-upside developmental corner — buy the athleticism, acknowledge the technique needs work.",
  "d'angelo ponds": "Ponds put up one of the best coverage seasons in this class relative to his size, posting an 89.9 overall grade with a 45.0 QB rating against, 3 INTs, and 10 PBUs despite coming in at just 5'9\", 182 lbs. The 43.5-inch vertical (100th percentile) is absurd and explains his ball-production instincts — he plays bigger than his frame. The size concern is real at boundary corner in the NFL, which likely pushes him inside to a slot-heavy role where his quickness and ball skills can thrive. For IDP dynasty, the slot role actually plays fine — consistent snap counts and playmaking opportunity. The model ranks him PFF-52 despite the quality production, reflecting size-related draft uncertainty more than talent.",
  "keionte scott": "Scott owns a 89.6 defensive grade and held quarterbacks to a 53.19 passer rating, making him one of the cleaner coverage options in this group even with the modest 4 PBU total. At 5'11\", 193 lbs he has legitimate boundary starter size and should see consistent snap counts as a starter. The 6.34% missed tackle rate is a yellow flag for IDP, suggesting he prefers to stay in coverage rather than come downhill — workable but not a tackle-upside play. He projects as a reliable zone corner who won't wow you with splash but won't burn you either. Dynasty floor is steady; the ceiling is capped without more interception production.",
  "chris johnson": "Johnson posted a genuinely elite coverage season — a 13.06 QB rating against is among the best in the entire class, and he backed it up with 4 INTs, 5 PBUs, and a 91.6 overall grade. The 4.40 forty (79th percentile) and strong RAS of 9.70 confirm he has the tools to back it up at the next level as a press-boundary corner. The 4.56% missed tackle rate is acceptable, not great, for IDP tackle purposes. The disconnect here is PFF's positional ranking (56th overall CB) despite the stat profile — likely a competition level or sample size adjustment, but worth monitoring as the NFL draft process plays out. If he lands in a press-heavy scheme, the INT upside for IDP dynasty is real.",
  "davison igbinosun": "At 6'2\", 189 lbs with a 4.45 forty, Igbinosun has the size-speed combo that boundary corners need to compete at NFL level. His 81.5 overall grade and 27.6 QB rating against show genuine coverage chops, and the 8 PBUs reflect an active ball-hawk on the perimeter. The athleticism metrics are mixed — the 34.0 vertical and 120-inch broad jump (both bottom quartile) suggest his explosiveness testing didn't match his on-field movement, which might temper athleticism-focused evaluators. His 5.6% missed tackle rate is middling for IDP purposes. The 6'2\" frame opens the door to a boundary role in man-heavy schemes, and that length gives him legitimate upside as an IDP contributor in the first four seasons.",
  "treydan stukes": "Stukes is a fascinating talent-gap case — the production is legitimately strong (90.1 grade, 21.99 QB rating, 4 INTs, 6 PBUs) but PFF has him ranked 105th overall, suggesting schematic or competition-level adjustments. His athleticism is elite across the board: a 4.33 forty (95th percentile), 9.88 RAS (99th percentile), and a 130-inch broad jump tell you the physical tools are no issue. At 6'1\", 190 lbs, he has boundary starter size and the speed to play outside press. The 5.29% missed tackle rate is acceptable. For dynasty IDP, the production-plus-athleticism combination is hard to ignore at the back half of the CB rankings — this looks like a steal if he lands in a team that values press-man corners.",
  "malik muhammad": "Muhammad is a burner — a 4.42 forty with a 9.45 RAS (95th percentile) and strong jump numbers put him in the conversation athletically. The production story is less clean: a 78.5 overall grade and 33.72 QB rating against are adequate, but the 9.63% missed tackle rate is the worst in this group and a genuine IDP concern. At 182 lbs he's on the lighter end, which may push him into a slot role where his speed can be weaponized rather than tested at the boundary. He put up 9 PBUs, so the ball awareness is there — he just needs to turn that into consistency. Low floor, traceable ceiling; buy only if the draft cost reflects the warts.",
  "chandler rivers": "Rivers is a compact, quick corner (5'10\", 185 lbs) with a 4.40 forty and 8.80 RAS who profiles as a slot or nickel option at the next level. The coverage grade is actually strong at 90.7 overall, but the 54.81 QB rating against tells you quarterbacks found enough success targeting him to keep going back. He generated 3 INTs and 6 PBUs, solid playmaking for his profile, but the 8.04% missed tackle rate is a problem — for a shorter corner likely playing in space, you need better tackle efficiency to generate IDP value. The model's lower scout grade (0.4) reflects the combination of size and tackle concerns. He's a depth/committee play in dynasty rather than a feature corner.",
  "jalon kilgore": "Kilgore is a unique physical outlier in this class — 6'1\", 210 lbs (98th percentile weight) with a 4.40 forty, which is a rare combination that could push some teams toward a safety or hybrid role. The production is a mixed bag: 5 INTs and 9 PBUs are strong raw numbers, but the 69.7 overall grade and 68.1 QB rating against suggest quarterbacks were willing to attack him. The 12.7% missed tackle rate is the worst in this class and a significant IDP negative. If he transitions to safety, his IDP profile improves dramatically with tackle volume; as a corner, the coverage grade has to clean up. Interesting dart throw for dynasty — watch where he's deployed before investing.",
  "daylen everette": "Everette checked every athleticism box — a 9.82 RAS (99th percentile), 4.38 forty (86th percentile), and 6'1\", 196 lb frame give him prototypical boundary corner size and speed. The production grade (73.4 overall) and 68.29 QB rating against are the honest concerns — quarterbacks had notable success targeting him, and 3 INTs on limited disruption plays suggests the splash production may outpace the coverage consistency. The 4.61% missed tackle rate is fine for IDP floor purposes. He's a true developmental pick where the athletic profile sets the ceiling and the coverage refinement sets the timeline — late-round dynasty stash with a two-to-three year horizon.",
  "keith abney ii": "Abney brings a solid all-around game for his size — at 5'10\", 187 lbs, he won't project as a true boundary corner, but his 86.3 overall grade and 41.49 QB rating against show genuine coverage effectiveness in a likely slot or nickel role. The 9 PBUs and 3 INTs suggest real ball instincts, and an outstanding 3.42% missed tackle rate makes him a reliable IDP contributor who won't leave points on the field when he engages in the run game. The model's scout grade (0.4) is cautious, likely reflecting size-based NFL role uncertainty rather than talent. If he lands in a slot-heavy scheme with high snap counts, the IDP floor here is quietly appealing for dynasty.",
  "tj hall": "Hall is the deepest dart throw in this CB group — a 248th overall PFF rank, 5.5 predicted max PPG, and a 5.99 RAS tell a story of a player fighting for a roster spot rather than a starting job. The 78.3 overall grade is passable and the 9 PBUs show some ball awareness, but the 4.59 forty (13th percentile) is a significant speed concern for a boundary corner at the NFL level. The 7.19 three-cone (18th percentile) adds to the agility worries. He's more of a zone-coverage piece than a man corner, and his snap count upside depends heavily on scheme fit and depth chart opportunity. Only worth a dynasty flier in very deep leagues; the athleticism floor limits his IDP ceiling considerably.",
  "dillon thieneman": "Box safety with elite athleticism — Thieneman's 9.65 RAS (98th percentile) backs up the eye test, and his 4.35 forty pairs with a 91.0 overall defensive grade that is hard to ignore. His run defense grade of 90.2 and 6 interceptions in college signal a playmaker who can roam near the line of scrimmage and also create turnovers, making him genuinely IDP-interesting on tackle volume and INT upside. That said, safeties are where this model goes to die — BT23 and BT24 correlations are both negative, meaning historical predictions at this position have been worse than guessing. Scout grade of 0.6 is the most trustworthy signal here, and it places Thieneman as a legitimate contributor without guaranteeing anything. Treat the impact score (61) as directional, not dependable.",
  "caleb downs": "Free safety prospect with strong instincts and top-of-class PFF credentials — Downs earned an 87.9 overall defensive grade and an 86.4 run defense grade, the latter being impressive for a player who projects more as a center-fielder type. His scout grade of 0.7 is the highest in this safety class and the most reliable piece of information available given the model's well-documented struggles at the position. That negative BT23/BT24 correlation is a real caveat — the S model has consistently misfired across draft classes, so even the most polished college safety profile doesn't translate cleanly to IDP projections. His tackle efficiency (7.85% missed tackle rate) is acceptable but not elite, and he only logged 2 INTs. The scout grade earns him a top-of-class designation here, but hold the ceiling claims loosely.",
  "emmanuel mcneil-warren": "At 6'4\" with a 9.13 RAS, McNeil-Warren has the rare frame of a true deep safety who can mirror tight ends and cover ground down the field. His 91.9 overall grade and 95.0 run defense grade are both outstanding, suggesting someone comfortable playing in the box as well — a versatile safety profile that coaches value. The 4.52 forty is a real concern for a player projecting as a deep centerfielder, and it may limit his range on the back end at the NFL level. He had only 2 INTs, which is modest for the coverage upside teams will expect given his size. The honest truth is that safety is the position where this model's predictions have the weakest track record — the scout grade of 0.6 is the anchor here, and everything else is background noise.",
  "a.j. haulcy": "Haulcy profiles as a strong safety who can operate near the line of scrimmage — his 86.6 overall grade and 85.6 run defense grade reflect a player who competes hard in the run game, and 5 college INTs show playmaking ability in coverage. His 6.4% missed tackle rate is clean, which matters for IDP formats where tackle volume drives value. No combine data is available, so physical projection is a question mark. The scout grade of 0.5 places him in the middle of the pack — this model is notoriously unreliable at safety (negative correlations in both tested draft classes), so Haulcy's floor and ceiling are genuinely hard to peg. He's a late-round IDP flier with reasonable upside, not a priority target.",
  "zakee wheatley": "Wheatley is a big-bodied safety at 6'3\", 203 lbs who plays with aggression against the run — his 87.7 run defense grade is the standout number, fitting a strong safety profile that could generate tackle volume in the right scheme. Three college INTs add some coverage credibility, and his 5.26% missed tackle rate is one of the cleaner marks in this class. The combine explosiveness numbers (32.5\" vertical, 96th percentile height) are a mixed bag — the frame is there but the burst doesn't pop. Scout grade of 0.4 is modest, and with safety being the position where this model has historically underperformed most — negative BT correlations in both measured cycles — there's genuine uncertainty around outcomes. Dart-throw territory late in drafts.",
  "genesis smith": "Deep safety prospect with elite combine explosion — a 42.5\" vertical (99th percentile) and 128\" broad jump (79th percentile) at 6'2\" is a rare athletic profile for the position. His 81.1 overall defensive grade is decent but the 72.9 run defense grade and brutal 16.97% missed tackle rate are legitimate concerns, signaling inconsistency as a wrap tackler. He logged 3 INTs in college, but the physical missed tackles undercut his IDP tackle-volume upside significantly. Scout grade of 0.4 reflects a player with tools but unresolved questions, and this model's historically poor track record at safety — BT correlations are negative — means the athletic ceiling may or may not show up in NFL production. The athleticism is worth monitoring, but it's speculative.",
  "kamari ramsey": "Slot safety who likely plays most snaps in a hybrid role near the line — Ramsey's 80.4 run defense grade fits that profile, and his 1.49% missed tackle rate is genuinely exceptional, ranking among the cleanest in this entire class. The coverage grade (79.4 overall) is functional rather than impressive, and he only produced 1 INT in his last season, limiting the big-play appeal in IDP scoring. Combine athleticism is moderate — 4.47 forty and 36.0\" vertical — nothing that unlocks a premium ceiling. Scout grade of 0.4 keeps expectations grounded, and the safety model's documented unreliability (negative BT correlations in both classes) means even that modest number carries uncertainty. His tackle efficiency is the one clear IDP-relevant trait.",
  "bud clark": "Clark is a free safety with excellent straight-line speed (4.41 forty, 76th percentile) and an elite 9.32 RAS, but the undersized flag at 188 lbs is a genuine concern — historical data shows undersized safeties at his weight have a 25% useful rate and a 0% star rate even when their RAS is high. His 89.8 overall grade and 4 INTs in college are strong for a coverage-heavy safety, and he showed some run defense ability (83.1 grade) despite the size limitations. Undrafted or late pick territory given the weight concern, though the athleticism is real. Safety is the one position where this model's predictions carry the least confidence — BT correlations are negative — so the scout grade of 0.5 and his clean tape are the most reliable signals. Be cautious about the undersized penalty.",
  "robert spears-jennings": "Spears-Jennings posted an eye-catching 4.32 forty (98th percentile) at 6'2\", 205 lbs, which is genuine centerfielder athleticism on paper. His run defense grade (93.1) is outstanding — unusually high for a player who figures to project as a deep safety — suggesting potential versatility across the secondary. Overall defensive grade of 78.7 is less inspiring, and just 1 INT limits the coverage credibility. Scout grade of 0.1 is the loudest signal here — very low, suggesting the evaluation community doesn't view him as a likely NFL contributor despite the measurables. The safety model is the worst-performing in the system by a significant margin, so don't anchor on the 4.32 speed and build a case around it. The athleticism is interesting, but the scout grade makes him a long shot.",
  "lorenzo styles jr.": "Styles is a pure speed prospect — a 4.27 forty (99th percentile) and 9.96 RAS (perfect score) are legitimately elite numbers at 6'1\", 194 lbs. The problem is that speed hasn't translated to production: a 66.0 overall defensive grade, 0 INTs, and a 13.3% missed tackle rate tell the story of a player who hasn't put it together in college. The run defense grade (71.0) is below average, and the size is borderline for a role near the line of scrimmage. Scout grade of 0.1 matches the production concerns — the evaluation community sees raw tools, not a finished safety. Safety is where this model is least predictive (negative BT correlations both years), so the gap between his speed and his tape is hard to resolve without NFL context. Track him for post-draft role clarity before investing.",
  "jalen stroman": "Stroman is a safety with functional college grades — 79.8 overall and 81.2 run defense — but no combine data available to assess athleticism, and no scout grade in the system, which is a meaningful gap at a position where the model already struggles most. His 9.77% missed tackle rate is on the high side, and 1 INT limits the coverage appeal in IDP. Without a scout grade to anchor projections, the model's already-poor reliability at safety (negative BT correlations in both measured classes) is compounded further — this is genuinely a player where confidence is low even by safety standards. He fits a box safety profile based on the run defense grade, but the overall tape grade is modest. Undrafted free agent territory; roster for depth in very deep formats only.",
  "vj payne": "Standing 6'3\", 206 lbs with a 9.87 RAS (99th percentile), Payne has the frame and athleticism of a high-upside deep safety. His 4.40 forty and 127\" broad jump confirm the tools are real, but his 73.3 overall defensive grade and 70.5 run defense grade reflect a player who hasn't yet converted athleticism to consistent production. He posted 2 INTs and a clean 5.32% missed tackle rate, offering a glimpse of what he could become in coverage. Scout grade of 0.4 reflects appropriate skepticism — the tools are there but the tape hasn't caught up, and safety remains the model's most unreliable position. Late-round stash candidate in dynasty; the physical profile earns him that much.",
  "cole wisniewski": "Wisniewski plays with a box-safety disposition — his 87.3 run defense grade is the headline number and would generate tackle volume in the right scheme. The 83.9 overall grade shows solid tape as a college producer, but 0 INTs and a 10.6% missed tackle rate limit the IDP upside; dynasty safeties need tackle consistency and turnovers, and the missed tackle rate is a concern. No combine data and no scout grade are both red flags for a player trying to crack a roster as an undrafted or late-round pick. The model's historical performance at safety is the worst of any position (negative BT in both classes), and without a scout grade the uncertainty compounds further. Worth monitoring if a box safety role emerges post-draft, but the information base here is thin.",
  "isaiah nwokobia": "Nwokobia posted an impressive 88.0 overall defensive grade with 4 INTs — one of the more complete production profiles in this class for a coverage-capable safety. His 83.5 run defense grade also suggests some box-safety ability, which is where IDP value lives. No combine data and no scout grade limit the projection confidence, which is especially problematic at a position where the model consistently underperforms historical baselines. The 7.66% missed tackle rate is acceptable. If an NFL team uses him in a hybrid role, the IDP case is real — but the missing scout grade and safety model's negative BT correlations mean this is speculation more than projection. He's one of the more intriguing under-the-radar safeties in the class based purely on tape metrics.",
  "jalen catalon": "Catalon is a compact safety with a strong tackle efficiency profile — 4.61% missed tackle rate is among the best in this class, and his 5 INTs demonstrate genuine playmaking instincts. His 79.4 overall and 79.0 run defense grades are solid but unremarkable, and the lack of combine data removes any physical ceiling case. No scout grade in the system leaves a meaningful information gap. Safety is the position where this model is least trustworthy — negative BT correlations in both tested draft classes mean even directional confidence is limited. The tackle efficiency and turnover production make him worth a late flier in deep IDP leagues, but the missing scout grade and overall grade ceiling cap how far you can push it."
};

  TE:{r2:'0.290',approach:'GRADE COMBINED',desc:'Scout grade anchors projections, with receiving grade and target volume/receiving yards as tiebreakers. High-volume TEs can outperform their scout grade when data supports it.'},
  DE:{r2:'0.201',approach:'COMBINED',desc:'Pass rush win rate, pass rush productivity (PRP), stop%, run defense grade, overall defense grade — all peak-season best values. Scout grade included as tiebreaker.'},
  DT:{r2:'—',approach:'STATS ONLY',desc:'Model is currently unreliable (negative cross-val R²) due to small training sample. Projections should be treated as exploratory.'},
  LB:{r2:'0.166',approach:'COMBINED',desc:'Pass rush win rate, PRP, stop%, tackling grade, run defense grade, coverage grade — peak-season best values. Scout grade included as tiebreaker.'},
  CB:{r2:'0.093',approach:'GRADE ONLY',desc:'Scout grade is the primary driver. Coverage stats vary heavily by scheme and opponent quality, limiting their cross-team predictive value.'},
  S:{r2:'0.303',approach:'GRADE COMBINED',desc:'Scout grade is the primary driver, with coverage grade, targets allowed, and yards allowed as tiebreakers. Players without a scout grade show reduced projections.'}
};
const PPG_THRESHOLDS={QB:[15,20],RB:[10,15],WR:[10,15],TE:[10,15],DE:[10,15],DT:[10,15],LB:[10,15],CB:[10,15],S:[10,15]};
const MDL_LABELS={pff_only:'PFF',stats_only:'STAT',combined:'COMB'};
const MDL_COLORS={pff_only:'rgba(74,200,245,.15)',stats_only:'rgba(212,245,74,.12)',combined:'rgba(167,139,250,.15)'};
const MDL_TEXT={pff_only:'var(--accent2)',stats_only:'var(--accent)',combined:'#a78bfa'};

let players=PLAYERS.map(p=>({...p}));
players.forEach(p=>{if(!p.predicted_max_ppg&&p.blended_ppg)p.predicted_max_ppg=p.blended_ppg;});
let filtered=[],pos='ALL',sort='pff',page=1,sel=null;
const PER=30;

function scoreColor(s){return s>=75?'#d4f54a':s>=50?'#4ac8f5':'#8891a8';}
function impactColor(s){return s>=60?'var(--accent)':s>=40?'var(--accent2)':s>=20?'var(--muted2)':'var(--accent3)';}
function impactLabel(s){return s>=60?'Elite':s>=40?'Strong':s>=20?'Developmental':'Minimal';}

function recompute(){
  const byPos={};
  players.forEach(p=>{(byPos[p.position]||(byPos[p.position]=[])).push(p.predicted_max_ppg);});
  Object.keys(byPos).forEach(pos=>{
    const vals=[...byPos[pos]].sort((a,b)=>a-b);
    const mn=vals[0],mx=vals[vals.length-1],rng=mx-mn;
    players.filter(p=>p.position===pos).forEach(p=>{
      p.draft_value=rng===0?50:Math.round((p.predicted_max_ppg-mn)/rng*100);
    });
  });
}

function filter(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  filtered=players.filter(p=>{
    if(pos!=='ALL'&&p.position!==pos) return false;
    if(q&&!p.display_name.toLowerCase().includes(q)) return false;
    return true;
  });
  filtered.sort((a,b)=>{
    if(sort==='impact') return (b.impact_score||0)-(a.impact_score||0);
    if(sort==='auction') return (b.proj_price||0)-(a.proj_price||0);
    if(sort==='value') return (b.value_gap||0)-(a.value_gap||0);
    if(sort==='pff') return (a.pff_rank||9999)-(b.pff_rank||9999);
    if(sort==='ppg') return b.predicted_max_ppg-a.predicted_max_ppg;
    if(sort==='useful') return (b.prob_useful||0)-(a.prob_useful||0);
    if(sort==='star') return (b.prob_star||0)-(a.prob_star||0);
    if(sort==='modelrank') return (a.model_overall_rank||9999)-(b.model_overall_rank||9999);
    if(sort==='name') return a.display_name.localeCompare(b.display_name);
    return 0;
  });
  page=1;render();
}

function setPos(p,btn){
  pos=p;
  document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filter();
}

function onSortChange(){
  sort=document.getElementById('sortSelect').value;
  filter();
}

function render(){
  const total=filtered.length;
  document.getElementById('hdrCount').textContent=total;
  const start=(page-1)*PER,slice=filtered.slice(start,start+PER);
  const container=document.getElementById('cards');
  if(!slice.length){
    container.innerHTML='<div class="empty"><big>—</big>No prospects found</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }
  container.innerHTML=slice.map((p,i)=>{
    const col=POS_COLORS[p.position]||'#94a3b8';
    const imp=p.impact_score!=null?p.impact_score:0;
    const impCol=impactColor(imp);
    const uCol=p.prob_useful==null?'var(--muted)':p.prob_useful>=60?'var(--accent)':p.prob_useful>=35?'var(--accent2)':'#8891a8';
    const uTxt=p.prob_useful!=null?p.prob_useful+'%':'—';
    const ppgTxt=p.type==='FA'?((p.blended_ppg||0).toFixed(1)):((p.predicted_max_ppg||0).toFixed(1));
    const ppgCol=p.type==='FA'?'var(--accent2)':impCol;
    const on=sel&&sel.name===p.name?' active':'';
    const priceHtml=p.proj_price>1?
      '<div class="p-card-price">$'+p.proj_price+
      (p.value_label==='value'?'<span style="font-size:9px;color:var(--accent);margin-left:2px">▲</span>':
       p.value_label==='slight_value'?'<span style="font-size:9px;color:var(--accent2);margin-left:2px">▲</span>':
       p.value_label==='overpriced'?'<span style="font-size:9px;color:var(--accent3);margin-left:2px">▼</span>':
       p.value_label==='slight_over'?'<span style="font-size:9px;color:#f59e0b;margin-left:2px">▼</span>':'')+
      '</div>':'';
    return '<div class="p-card'+on+'" data-name="'+p.name+'" onclick="selectPlayer(this.dataset.name)">'+
      '<div class="p-card-top">'+
        '<div>'+
          '<div class="p-card-name">'+p.display_name+'</div>'+
          '<div class="p-card-meta">'+
            '<span class="pos-chip" style="background:'+col+'1a;color:'+col+'">'+p.position+'</span>'+
            ' &nbsp;'+p.total_games+' games'+
          '</div>'+
        '</div>'+
        '<div class="p-card-right">'+
          '<div class="p-card-pff">PFF #'+p.pff_rank+'</div>'+
          priceHtml+
        '</div>'+
      '</div>'+
      '<div class="p-card-metrics">'+
        '<div class="metric-block">'+
          '<div class="metric-lbl">Impact</div>'+
          (p.type==='FA'?
            '<div class="metric-val" style="color:var(--accent2);font-size:18px">'+(p.blended_ppg||0).toFixed(1)+' <span style="font-size:11px;color:var(--muted)">ppg</span></div>':
            '<div class="metric-val" style="color:'+impCol+'">'+imp+'</div>'+
            '<div class="metric-bar-track"><div class="metric-bar-fill" style="width:'+imp+'%;background:'+impCol+'"></div></div>'
          )+
        '</div>'+
        '<div class="metric-block">'+
          '<div class="metric-lbl">Useful%</div>'+
          '<div class="metric-val" style="color:'+uCol+'">'+uTxt+'</div>'+
        '</div>'+
        '<div class="metric-block">'+
          '<div class="metric-lbl">Proj PPG</div>'+
          '<div class="metric-val" style="color:'+ppgCol+';font-size:18px">'+ppgTxt+'</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
  renderPagination(total);
}

function renderPagination(total){
  const pages=Math.ceil(total/PER);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return;}
  let s=Math.max(1,page-2),e=Math.min(pages,s+4);
  if(e-s<4) s=Math.max(1,e-4);
  let h='';
  if(page>1) h+='<button class="pg-btn" onclick="goPage('+(page-1)+')">‹</button>';
  for(let i=s;i<=e;i++) h+='<button class="pg-btn'+(i===page?' on':'')+'" onclick="goPage('+i+')">'+ i+'</button>';
  if(page<pages) h+='<button class="pg-btn" onclick="goPage('+(page+1)+')">›</button>';
  document.getElementById('pagination').innerHTML=h;
}

function goPage(p){page=p;render();document.getElementById('scrollArea').scrollTo(0,0);}

function posRank(p){
  return players.filter(x=>x.position===p.position).sort((a,b)=>b.draft_value-a.draft_value).findIndex(x=>x.name===p.name)+1;
}
function pffPosRank(p){
  return players.filter(x=>x.position===p.position).sort((a,b)=>a.pff_rank-b.pff_rank).findIndex(x=>x.name===p.name)+1;
}

function selectPlayer(name){

      const hasRasAdj=w.ras_modifies&&w.ras_tier!=null;

      const rasClears=hasRasAdj&&w.ras_useful>=w.useful_comp;
      const dispUseful=hasRasAdj?w.ras_useful:w.useful_rate;
      const dispStar=hasRasAdj?w.ras_star:w.star_rate;
      const titleCol=rasClears?'var(--accent)':'#f59e0b';

      else if(noRasYet) body=(isDT?'Heavy DTs trend toward run-stuffing.':wcol+' '+w.label+' historically reduces output at '+p.position+'.')+' RAS not yet available.';

  // Key stats

  const statsHtml='<div class="sec-lbl">Key College Stats</div>'+

    (Object.keys(stats).length?Object.entries(stats).map(([lbl,val])=>{

        (pct!=null?'<div style="height:3px;background:var(--border2);border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+pctCol+';border-radius:2px"></div></div>'+
        '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted);margin-top:2px">'+pctLbl+' ('+pct+'th)</div>':'')+

    }).join(''):'<div style="color:var(--muted);font-size:12px;padding:8px 0">No detailed stats available.</div>')+

  // Model Signal tile
  const mi=MODEL_INFO[p.position]||{};
  const modelHtml='<div class="sec-lbl" style="margin-top:4px;">Model Signal</div>'+

  // Analysis
  const analysisText=ANALYSIS[p.name]||'No analysis available for this player.';
  const analysisHtml='<div class="sec-lbl" style="margin-top:4px;">Model Analysis</div>'+
    '<div class="analysis-box">'+analysisText+'</div>';

  // PFF edit
  const pffEditHtml='<div class="pff-edit-row">'+
    '<span class="pff-edit-lbl">Update PFF rank:</span>'+
    '<input class="pff-input" id="dPFFInput" type="number" placeholder="rank" min="1" value="'+(p.pff_rank||'')+'">'+
    '<button class="pff-btn" onclick="updateFromDetail()">Set</button>'+
  '</div>';

  // Build full sheet body
  document.getElementById('sheetBody').innerHTML =
    // Impact score gauge
    '<div class="sec-lbl">Impact Score</div>'+
    '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;">'+
      '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px;">'+
        '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:48px;letter-spacing:1px;line-height:1;color:'+impCol+'">'+imp+'</div>'+
        '<div style="font-family:\'DM Mono\',monospace;font-size:14px;color:var(--muted)">/100 &nbsp;'+impactLabel(imp)+'</div>'+
      '</div>'+
      '<div class="gauge-track"><div class="gauge-fill" style="width:'+imp+'%;background:'+impCol+'"></div></div>'+
      '<div class="gauge-labels"><span>0</span><span>100</span></div>'+
      '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'+
        '<span style="font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;">Market Value</span>'+
        '<span style="font-family:\'DM Mono\',monospace;font-size:12px;font-weight:600;padding:4px 8px;border-radius:5px;background:'+vb.bg+';color:'+vb.col+'">'+vb.text+'</span>'+
      '</div>'+
    '</div>'+

    // Probability scores
    '<div class="scores-row">'+
      '<div class="score-card" style="background:rgba(212,245,74,.03);border-color:rgba(212,245,74,.15);">'+
        '<div class="score-card-lbl">Useful</div>'+
        '<div class="score-card-val" style="color:'+(p.prob_useful==null?'var(--muted)':p.prob_useful>=60?'var(--accent)':p.prob_useful>=35?'var(--accent2)':'#8891a8')+'">'+
          (p.prob_useful!=null?p.prob_useful+'%':'—')+'</div>'+
        '<div class="score-card-sub">&ge;starter</div>'+
      '</div>'+
      '<div class="score-card">'+
        '<div class="score-card-lbl">Star</div>'+
        '<div class="score-card-val" style="color:'+(p.prob_star==null?'var(--muted)':p.prob_star>=40?'#f59e0b':p.prob_star>=20?'var(--accent3)':'#8891a8')+'">'+
          (p.prob_star!=null?p.prob_star+'%':'—')+'</div>'+
        '<div class="score-card-sub">&ge;elite</div>'+
      '</div>'+
      '<div class="score-card">'+
        '<div class="score-card-lbl">Peak PPG</div>'+
        '<div class="score-card-val" style="font-size:22px;color:'+impCol+'">'+ppgVal+'</div>'+
        '<div class="score-card-sub">projected</div>'+
      '</div>'+
    '</div>'+

    // Position rank
    '<div class="rank-row">'+
      '<div class="rank-card">'+
        '<div class="score-card-lbl">Position Rank</div>'+
        '<div style="display:flex;gap:12px;align-items:flex-end;">'+
          '<div><div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;">Model</div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--accent)">#'+pr+'</div></div>'+
          '<div><div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;">PFF</div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--accent2)">#'+pffPr+'</div></div>'+
        '</div>'+
        '<div style="font-size:10px;color:var(--muted2);">of '+posTotal+' '+p.position+'s</div>'+
        gapHtml+
      '</div>'+
      '<div class="rank-card">'+
        '<div class="score-card-lbl">Overall Rank</div>'+
        '<div style="display:flex;gap:12px;align-items:flex-end;">'+
          '<div><div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;">PFF</div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--accent2)">#'+p.pff_rank+'</div></div>'+
        '</div>'+
        '<div style="font-size:10px;color:var(--muted2);">of '+players.length+' prospects</div>'+
        oGapHtml+
      '</div>'+
    '</div>'+

    depthHtml+
    sizeHtml+
    statsHtml+
    noteHtml+
    auctionHtml+
    modelHtml+
    combineHtml+
    analysisHtml+
    pffEditHtml;

  // Open overlay
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheetBody').scrollTop=0;
  render();
}

function closeDetail(){
  sel=null;
  document.getElementById('overlay').classList.remove('open');
  render();
}

function onOverlayClick(e){
  if(e.target===document.getElementById('overlay')||e.target.classList.contains('overlay-backdrop')){
    closeDetail();
  }
}

function updateFromDetail(){
  if(!sel) return;
  const r=parseInt(document.getElementById('dPFFInput').value);
  if(!r||r<1) return;
  applyRankUpdate(sel.name,r);
  selectPlayer(sel.name);
}

function submitPFF(){
  const q=document.getElementById('pffName').value.trim().toLowerCase();
  const r=parseInt(document.getElementById('pffRank').value);
  if(!q||!r||r<1) return;
  const match=players.find(p=>p.display_name.toLowerCase().includes(q));
  if(!match) return;
  applyRankUpdate(match.name,r);
}

function applyRankUpdate(name,newRank){
  const p=players.find(x=>x.name===name);
  if(!p) return;
  p.pff_rank=newRank;
  if(p.approach==='pff_only'||p.approach==='combined'){
    const peers=players.filter(x=>x.position===p.position).sort((a,b)=>a.pff_rank-b.pff_rank);
    if(peers.length>1){
      const maxR=peers[peers.length-1].pff_rank;
      const normR=Math.min(newRank,maxR)/maxR;
      const ppgSorted=peers.map(x=>x.predicted_max_ppg).sort((a,b)=>b-a);
      const idx=Math.floor(normR*(ppgSorted.length-1));
      p.predicted_max_ppg=Math.round(ppgSorted[idx]*1000)/1000;
    }
  }
  recompute();filter();
}

document.getElementById('searchInput').addEventListener('input',filter);
recompute();filter();
</script>
</body>
</html>
