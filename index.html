const MDL_COLORS={pff_only:'rgba(74,200,245,.15)',stats_only:'rgba(212,245,74,.12)',combined:'rgba(167,139,250,.15)'};
const MDL_TEXT={pff_only:'var(--accent2)',stats_only:'var(--accent)',combined:'#a78bfa'};

let players=PLAYERS.map(p=>({...p}));
players.forEach(p=>{if(!p.predicted_max_ppg&&p.blended_ppg)p.predicted_max_ppg=p.blended_ppg;});
let filtered=[],pos='ALL',sort='pff',page=1,sel=null;
const PER=30;

function scoreColor(s){return s>=75?'#d4f54a':s>=50?'#4ac8f5':'#8891a8';}
function impactColor(s){return s>=60?'var(--accent)':s>=40?'var(--accent2)':s>=20?'var(--muted2)':'var(--accent3)';}
function impactLabel(s){return s>=60?'Elite':s>=40?'Strong':s>=20?'Developmental':'Minimal';}

function recompute(){
  const byPos={};
  players.forEach(p=>{(byPos[p.position]||(byPos[p.position]=[])).push(p.predicted_max_ppg);});
  Object.keys(byPos).forEach(pos=>{
    const vals=[...byPos[pos]].sort((a,b)=>a-b);
    const mn=vals[0],mx=vals[vals.length-1],rng=mx-mn;
    players.filter(p=>p.position===pos).forEach(p=>{
      p.draft_value=rng===0?50:Math.round((p.predicted_max_ppg-mn)/rng*100);
    });
  });
}

function filter(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  filtered=players.filter(p=>{
    if(pos!=='ALL'&&p.position!==pos) return false;
    if(q&&!p.display_name.toLowerCase().includes(q)) return false;
    return true;
  });
  filtered.sort((a,b)=>{
    if(sort==='impact') return (b.impact_score||0)-(a.impact_score||0);
    if(sort==='auction') return (b.proj_price||0)-(a.proj_price||0);
    if(sort==='value') return (b.value_gap||0)-(a.value_gap||0);
    if(sort==='pff') return (a.pff_rank||9999)-(b.pff_rank||9999);
    if(sort==='ppg') return b.predicted_max_ppg-a.predicted_max_ppg;
    if(sort==='useful') return (b.prob_useful||0)-(a.prob_useful||0);
    if(sort==='star') return (b.prob_star||0)-(a.prob_star||0);
    if(sort==='modelrank') return (a.model_overall_rank||9999)-(b.model_overall_rank||9999);
    if(sort==='name') return a.display_name.localeCompare(b.display_name);
    return 0;
  });
  page=1;render();
}

function setPos(p,btn){
  pos=p;
  document.querySelectorAll('.pos-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filter();
}

function onSortChange(){
  sort=document.getElementById('sortSelect').value;
  filter();
}

function render(){
  const total=filtered.length;
  document.getElementById('hdrCount').textContent=total;
  const start=(page-1)*PER,slice=filtered.slice(start,start+PER);
  const container=document.getElementById('cards');
  if(!slice.length){
    container.innerHTML='<div class="empty"><big>—</big>No prospects found</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }
  container.innerHTML=slice.map((p,i)=>{
    const col=POS_COLORS[p.position]||'#94a3b8';
    const imp=p.impact_score!=null?p.impact_score:0;
    const impCol=impactColor(imp);
    const uCol=p.prob_useful==null?'var(--muted)':p.prob_useful>=60?'var(--accent)':p.prob_useful>=35?'var(--accent2)':'#8891a8';
    const uTxt=p.prob_useful!=null?p.prob_useful+'%':'—';
    const ppgTxt=p.type==='FA'?((p.blended_ppg||0).toFixed(1)):((p.predicted_max_ppg||0).toFixed(1));
    const ppgCol=p.type==='FA'?'var(--accent2)':impCol;
    const on=sel&&sel.name===p.name?' active':'';
    const priceHtml=p.proj_price>1?
      '<div class="p-card-price">$'+p.proj_price+
      (p.value_label==='value'?'<span style="font-size:9px;color:var(--accent);margin-left:2px">▲</span>':
       p.value_label==='slight_value'?'<span style="font-size:9px;color:var(--accent2);margin-left:2px">▲</span>':
       p.value_label==='overpriced'?'<span style="font-size:9px;color:var(--accent3);margin-left:2px">▼</span>':
       p.value_label==='slight_over'?'<span style="font-size:9px;color:#f59e0b;margin-left:2px">▼</span>':'')+
      '</div>':'';
    return '<div class="p-card'+on+'" data-name="'+p.name+'" onclick="selectPlayer(this.dataset.name)">'+
      '<div class="p-card-top">'+
        '<div>'+
          '<div class="p-card-name">'+p.display_name+'</div>'+
          '<div class="p-card-meta">'+
            '<span class="pos-chip" style="background:'+col+'1a;color:'+col+'">'+p.position+'</span>'+
            ' &nbsp;'+p.total_games+' games'+
          '</div>'+
        '</div>'+
        '<div class="p-card-right">'+
          '<div class="p-card-pff">PFF #'+p.pff_rank+'</div>'+
          priceHtml+
        '</div>'+
      '</div>'+
      '<div class="p-card-metrics">'+
        '<div class="metric-block">'+
          '<div class="metric-lbl">Impact</div>'+
          (p.type==='FA'?
            '<div class="metric-val" style="color:var(--accent2);font-size:18px">'+(p.blended_ppg||0).toFixed(1)+' <span style="font-size:11px;color:var(--muted)">ppg</span></div>':
            '<div class="metric-val" style="color:'+impCol+'">'+imp+'</div>'+
            '<div class="metric-bar-track"><div class="metric-bar-fill" style="width:'+imp+'%;background:'+impCol+'"></div></div>'
          )+
        '</div>'+
        '<div class="metric-block">'+
          '<div class="metric-lbl">Useful%</div>'+
          '<div class="metric-val" style="color:'+uCol+'">'+uTxt+'</div>'+
        '</div>'+
        '<div class="metric-block">'+
          '<div class="metric-lbl">Proj PPG</div>'+
          '<div class="metric-val" style="color:'+ppgCol+';font-size:18px">'+ppgTxt+'</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
  renderPagination(total);
}

function renderPagination(total){
  const pages=Math.ceil(total/PER);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return;}
  let s=Math.max(1,page-2),e=Math.min(pages,s+4);
  if(e-s<4) s=Math.max(1,e-4);
  let h='';
  if(page>1) h+='<button class="pg-btn" onclick="goPage('+(page-1)+')">‹</button>';
  for(let i=s;i<=e;i++) h+='<button class="pg-btn'+(i===page?' on':'')+'" onclick="goPage('+i+')">'+ i+'</button>';
  if(page<pages) h+='<button class="pg-btn" onclick="goPage('+(page+1)+')">›</button>';
  document.getElementById('pagination').innerHTML=h;
}

function goPage(p){page=p;render();document.getElementById('scrollArea').scrollTo(0,0);}

function posRank(p){
  return players.filter(x=>x.position===p.position).sort((a,b)=>b.draft_value-a.draft_value).findIndex(x=>x.name===p.name)+1;
}
function pffPosRank(p){
  return players.filter(x=>x.position===p.position).sort((a,b)=>a.pff_rank-b.pff_rank).findIndex(x=>x.name===p.name)+1;
}

function selectPlayer(name){

  const depth=p.pos_depth||{};

  const warnings=p.size_warnings||[];

    }).join(''):'<div style="color:var(--muted);font-size:12px;padding:8px 0">No detailed stats available.</div>')+
    '</div>';

  // Model Signal tile
  const mi=MODEL_INFO[p.position]||{};
  const modelHtml='<div class="sec-lbl" style="margin-top:4px;">Model Signal</div>'+
    '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;">'+
      '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px;">'+

      '<div class="metric-lbl" style="margin-bottom:6px;">'+(mi.approach||'—')+'</div>'+

    // Impact score gauge

    '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;">'+

        '<div style="font-family:\'DM Mono\',monospace;font-size:14px;color:var(--muted)">/100 &nbsp;'+impactLabel(imp)+'</div>'+
      '</div>'+
      '<div class="gauge-track"><div class="gauge-fill" style="width:'+imp+'%;background:'+impCol+'"></div></div>'+
      '<div class="gauge-labels"><span>0</span><span>100</span></div>'+
      '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'+
        '<span style="font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;">Market Value</span>'+
        '<span style="font-family:\'DM Mono\',monospace;font-size:12px;font-weight:600;padding:4px 8px;border-radius:5px;background:'+vb.bg+';color:'+vb.col+'">'+vb.text+'</span>'+
      '</div>'+
    '</div>'+

    // Probability scores
    '<div class="scores-row">'+
      '<div class="score-card" style="background:rgba(212,245,74,.03);border-color:rgba(212,245,74,.15);">'+
        '<div class="score-card-lbl">Useful</div>'+
        '<div class="score-card-val" style="color:'+(p.prob_useful==null?'var(--muted)':p.prob_useful>=60?'var(--accent)':p.prob_useful>=35?'var(--accent2)':'#8891a8')+'">'+
          (p.prob_useful!=null?p.prob_useful+'%':'—')+'</div>'+
        '<div class="score-card-sub">&ge;starter</div>'+
      '</div>'+
      '<div class="score-card">'+
        '<div class="score-card-lbl">Star</div>'+
        '<div class="score-card-val" style="color:'+(p.prob_star==null?'var(--muted)':p.prob_star>=40?'#f59e0b':p.prob_star>=20?'var(--accent3)':'#8891a8')+'">'+
          (p.prob_star!=null?p.prob_star+'%':'—')+'</div>'+
        '<div class="score-card-sub">&ge;elite</div>'+
      '</div>'+
      '<div class="score-card">'+
        '<div class="score-card-lbl">Peak PPG</div>'+
        '<div class="score-card-val" style="font-size:22px;color:'+impCol+'">'+ppgVal+'</div>'+
        '<div class="score-card-sub">projected</div>'+
      '</div>'+
    '</div>'+

    // Position rank
    '<div class="rank-row">'+
      '<div class="rank-card">'+
        '<div class="score-card-lbl">Position Rank</div>'+
        '<div style="display:flex;gap:12px;align-items:flex-end;">'+
          '<div><div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;">Model</div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--accent)">#'+pr+'</div></div>'+
          '<div><div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;">PFF</div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--accent2)">#'+pffPr+'</div></div>'+
        '</div>'+
        '<div style="font-size:10px;color:var(--muted2);">of '+posTotal+' '+p.position+'s</div>'+
        gapHtml+
      '</div>'+
      '<div class="rank-card">'+
        '<div class="score-card-lbl">Overall Rank</div>'+
        '<div style="display:flex;gap:12px;align-items:flex-end;">'+
          '<div><div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;">PFF</div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--accent2)">#'+p.pff_rank+'</div></div>'+
        '</div>'+
        '<div style="font-size:10px;color:var(--muted2);">of '+players.length+' prospects</div>'+
        oGapHtml+
      '</div>'+
    '</div>'+

    depthHtml+
    sizeHtml+
    statsHtml+
    noteHtml+
    auctionHtml+
    modelHtml+
    combineHtml+
    analysisHtml+
    pffEditHtml;

  // Open overlay
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheetBody').scrollTop=0;
  render();
}

function closeDetail(){
  sel=null;
  document.getElementById('overlay').classList.remove('open');
  render();
}

function onOverlayClick(e){
  if(e.target===document.getElementById('overlay')||e.target.classList.contains('overlay-backdrop')){
    closeDetail();
  }
}

function updateFromDetail(){
  if(!sel) return;
  const r=parseInt(document.getElementById('dPFFInput').value);
  if(!r||r<1) return;
  applyRankUpdate(sel.name,r);
  selectPlayer(sel.name);
}

function submitPFF(){
  const q=document.getElementById('pffName').value.trim().toLowerCase();
  const r=parseInt(document.getElementById('pffRank').value);
  if(!q||!r||r<1) return;
  const match=players.find(p=>p.display_name.toLowerCase().includes(q));
  if(!match) return;
  applyRankUpdate(match.name,r);
}

function applyRankUpdate(name,newRank){
  const p=players.find(x=>x.name===name);
  if(!p) return;
  p.pff_rank=newRank;
  if(p.approach==='pff_only'||p.approach==='combined'){
    const peers=players.filter(x=>x.position===p.position).sort((a,b)=>a.pff_rank-b.pff_rank);
    if(peers.length>1){
      const maxR=peers[peers.length-1].pff_rank;
      const normR=Math.min(newRank,maxR)/maxR;
      const ppgSorted=peers.map(x=>x.predicted_max_ppg).sort((a,b)=>b-a);
      const idx=Math.floor(normR*(ppgSorted.length-1));
      p.predicted_max_ppg=Math.round(ppgSorted[idx]*1000)/1000;
    }
  }
  recompute();filter();
}

document.getElementById('searchInput').addEventListener('input',filter);
recompute();filter();
</script>
</body>
</html>
